[build-system]
requires = ["maturin>=1.5,<2.0"]
build-backend = "maturin"

[project]
name = "fray"
version = "0.1.0"
requires-python = ">=3.11,<3.13"
dependencies = [
    "click>=8.0",
    "cloudpickle>=3.1.2",
    "fastapi>=0.100.0",
    "flask",
    "fsspec>=2024.0.0",
    "httpx>=0.28.1",
    "humanfriendly>=10.0",
    "mergedeep",
    "pyyaml>=6.0",
    "typing-extensions>=4.0",
    "uvicorn[standard]>=0.23.0",
    "zstandard>=0.22.0",
]

[project.scripts]
fray = "fray.cli:main"

[project.optional-dependencies]
ray = ["ray==2.45"]

[dependency-groups]
test = [
    "numpy",
    "pip", # ray requires pip to be installed
    "pytest-timeout",
    "pytest>=8.3.2",
    "ray[default]",
]
tpu_test = ["jax[tpu]", { include-group = "test" }]
dev = [{ include-group = "test" }]

[tool.maturin]
module-name = "fray.fray_rpc"
manifest-path = "Cargo.toml"
python-source = "src"

[tool.uv]
cache-keys = [
    "Cargo.toml",
    "Cargo.lock",
    "build.rs",
    "rust_src/**/*.rs",
    "proto/*.proto",
]
