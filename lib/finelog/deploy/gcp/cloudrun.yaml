# finelog on Cloud Run.
#
# NOTE: Cloud Run is best for short-lived demos or single-tenant dev
# environments. For production, prefer GKE (see ../k8s/):
# Cloud Run does not provide a true persistent local volume, instances are
# scaled to zero / recycled at the platform's discretion (which violates
# our single-writer assumption), and GCS Fuse adds latency to the local
# segment cache. We work around this here by pinning min=max=1 and using
# a GCS Fuse mount for /var/cache/finelog.
#
# Deploy:
#   gcloud run services replace cloudrun.yaml --region=us-central1
#
# Replace `gcr.io/PROJECT/finelog:latest` with your image, and the
# `FINELOG_REMOTE_DIR` value with your GCS bucket.
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: log-server
  annotations:
    # Internal-only: not reachable from the public internet. Callers must
    # be inside the VPC (or routed via Serverless VPC Access).
    run.googleapis.com/ingress: internal
    # Single-writer constraint: pin a single warm instance.
    run.googleapis.com/launch-stage: BETA
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "1"
        # Enable second-gen execution environment so GCS Fuse volumes work.
        run.googleapis.com/execution-environment: gen2
        # Mount a GCS bucket as the local segment cache. Replace BUCKET.
        run.googleapis.com/cpu-throttling: "false"
    spec:
      containerConcurrency: 100
      timeoutSeconds: 300
      containers:
        - image: gcr.io/PROJECT/finelog:latest  # replace PROJECT
          ports:
            - name: http1
              containerPort: 10001
          env:
            - name: FINELOG_REMOTE_DIR
              value: "gs://PROJECT-finelog/archive"  # replace bucket
          resources:
            limits:
              cpu: "2"
              memory: "4Gi"
          volumeMounts:
            - name: cache
              mountPath: /var/cache/finelog
      volumes:
        - name: cache
          csi:
            driver: gcsfuse.run.googleapis.com
            volumeAttributes:
              bucketName: PROJECT-finelog-cache  # replace bucket
