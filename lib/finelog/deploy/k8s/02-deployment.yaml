# finelog log-server Deployment.
#
# Single-writer constraint: keep replicas=1. The store assumes one writer
# at a time; running multiple replicas will corrupt segments. The Recreate
# strategy enforces this during rollouts.
#
# Configuration:
#   - FINELOG_REMOTE_DIR: gs:// URI for archived Parquet segments. Leave
#     unset to disable remote offload (dev); set in prod.
#   - Local segment cache lives on the PVC mounted at /var/cache/finelog.
#
# Resource tuning: requests/limits below are sized for moderate (~few
# hundred RPS) ingest. Bump CPU limits before memory; ingest is duckdb-
# bound and CPU-heavy.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-server
  labels:
    app: log-server
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: log-server
  template:
    metadata:
      labels:
        app: log-server
    spec:
      containers:
        - name: finelog
          image: gcr.io/PROJECT/finelog:latest  # replace PROJECT with your GCP project
          imagePullPolicy: IfNotPresent
          ports:
            - name: rpc
              containerPort: 10001
              protocol: TCP
          env:
            - name: FINELOG_REMOTE_DIR
              value: ""  # e.g. "gs://my-bucket/finelog"
          volumeMounts:
            - name: cache
              mountPath: /var/cache/finelog
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          livenessProbe:
            tcpSocket:
              port: 10001
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 10001
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: cache
          persistentVolumeClaim:
            claimName: log-server-cache
