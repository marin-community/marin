# Smoke-test config for scripts/gpu_gang_smoke.py against a local `kind` cluster.
#
# This stands in for a 3-node CoreWeave H100 cluster. kind has no GPUs, so the
# "GPU" job here is CPU-only (gpu_count: 0) — it exercises the SAME Kueue gang
# admission path (atomic all-or-nothing startup of a coscheduled pod group),
# just without real accelerators. The job entrypoint is a placeholder standing
# in for the real jax/levanter distributed-init logic.
#
# See lib/iris/config/coreweave-gpu-smoke.yaml for the real-CoreWeave variant.

target: kind
namespace: iris
# kind writes its kubeconfig here during setup; the script reads it back.
kubeconfig_path: ~/.kube/iris-kind-gpu-smoke
# Kueue LocalQueue stamped on coscheduled pods (kueue.x-k8s.io/queue-name). For
# kind the harness DERIVES this from label_prefix (iris -> iris-lq) via the real
# controller bootup; this value is only consumed by the coreweave target.
local_queue: iris-lq
# Any image with bash + python on PATH. The placeholder entrypoint is pure
# stdlib python, so the slim image is enough and pulls fast.
image: python:3.11-slim

job:
  name: gpu-gang-smoke
  replicas: 3
  # group_by: pool maps (via _CW_DEFAULT_TOPOLOGIES) to a leafgroup
  # podset-preferred-topology annotation, so the gang exercises BOTH atomic
  # all-or-nothing admission (pod-group-total-count) AND Topology-Aware
  # Scheduling. The harness labels the kind workers into one synthetic leafgroup
  # (backend.coreweave.cloud/*) so TAS can place the whole podset in one domain.
  group_by: pool
  priority_band: batch          # production | interactive | batch
  cpu: "0.25"                   # cores per task
  memory: 256Mi
  disk: "0"                     # 0 => no ephemeral-storage request
  gpu_variant: ""               # no real GPUs on kind
  gpu_count: 0
  runtime_seconds: 8            # placeholder "training" duration

kind:
  cluster_name: iris-gpu-smoke
  workers: 3                    # one worker node per gang replica

kueue:
  install: true                 # install + configure Kueue on the kind cluster
  version: v0.11.0
  # ClusterQueue quota is non-binding (install_kueue.NON_BINDING_QUOTA); Kueue
  # only gang-admits + places, so there is nothing to size here.
