# Smoke-test config for scripts/gpu_gang_smoke.py against a REAL CoreWeave
# cluster: provision a dedicated 3-node H100 pool, run one 3x8 = 24-GPU
# coscheduled job through Kueue gang admission, then tear the pool down.
#
# WARNING: this provisions 3 x gd-8xh100ib-i128 nodes (24 H100s) on-demand.
# That is expensive. The script only runs this when target == coreweave AND
# --i-understand-the-cost is passed. Validate on kind first.
#
# Kueue's operator + the cluster-scoped ClusterQueue/ResourceFlavor/Topologies are
# assumed admin-provisioned on CKS (install_kueue.py --variant coreweave
# --with-queues; kueue.install: false here). This smoke creates only its OWN
# namespaced LocalQueue (bound to that ClusterQueue) at setup.
#
# DEDICATED namespace: the smoke drives a standalone K8sTaskProvider, which
# reconciles the WHOLE namespace (it deletes every iris.managed pod not in its
# batch). It must therefore own its namespace exclusively — NEVER point this at a
# namespace a live iris-controller manages (e.g. iris-ci), or it will delete that
# controller's pods. setup() hard-fails if the namespace is already owned.

target: coreweave
namespace: iris-smoke
kubeconfig_path: ~/.kube/coreweave-iris
# LocalQueue this smoke creates in its namespace (also derived from label_prefix
# "iris" as {prefix}-lq); bound to the admin ClusterQueue iris-cq.
local_queue: iris-lq
image: ghcr.io/marin-community/iris-task:latest

job:
  name: gpu-gang-smoke
  replicas: 3
  # group_by selects the Kueue podset topology from the provider's CoreWeave
  # defaults (iris follows CKS conventions, see tasks.py _CW_DEFAULT_TOPOLOGIES):
  #   pool     -> preferred (soft) backend.coreweave.cloud/leafgroup
  #   nvlink   -> required (hard)  ds.coreweave.com/nvlink.domain
  #   tpu-name -> required (hard)  ds.coreweave.com/nvlink.domain
  # "pool" keeps the 3 nodes preferring the same IB leafgroup for multi-host
  # NCCL without making it a hard constraint. A cluster config can override these
  # via kubernetes_provider.kueue.topologies.
  group_by: pool
  priority_band: batch
  cpu: "32"                     # cores per task (matches H100 node sizing)
  memory: 512Gi
  disk: 100Gi
  gpu_variant: H100
  gpu_count: 8                  # 8 GPUs per task -> 3 x 8 = 24 GPUs
  runtime_seconds: 30

kueue:
  install: false                # admin-provisioned on CKS

coreweave:
  region: US-WEST-04A
  scale_group: h100-8x
  instance_type: gd-8xh100ib-i128
  # NodePool target node count; the gang needs all 3 up before Kueue admits it.
  nodes: 3
  ensure_nodepools: true        # create the h100-8x NodePool so CKS provisions nodes
  delete_nodepools_on_teardown: true
