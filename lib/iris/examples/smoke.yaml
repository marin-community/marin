# Iris smoke-test configuration
# Usage: uv run pytest lib/iris/tests/e2e/test_smoke.py -m e2e --iris-config examples/smoke.yaml --iris-mode full -o "addopts="

platform:
  label_prefix: smoke-ci
  gcp:
    project_id: hai-gcp-models

defaults:
  autoscaler:
    evaluation_interval:
      milliseconds: 10000
    scale_up_delay:
      milliseconds: 60000
    scale_down_delay:
      milliseconds: 300000
  worker:
    docker_image: ghcr.io/marin-community/iris-worker:latest
    default_task_image: ghcr.io/marin-community/iris-task:latest
    port: 10001

storage:
  remote_state_dir: gs://marin-us-central2/iris/smoke/state

controller:
  image: ghcr.io/marin-community/iris-controller:latest
  gcp:
    zone: europe-west4-b
    machine_type: e2-standard-4
    port: 10000

scale_groups:
  # Low-priority fallback CPU VM group for non-preemptible scheduling tests.
  # Intentionally not default: selected only when jobs constrain preemptible=false.
  cpu_vm_e2_standard_4_ondemand:
    zones: [europe-west4-b]
    num_vms: 1
    resources:
      cpu: 4
      ram: 16GB
      disk: 100GB
      device_type: cpu
      preemptible: false
    min_slices: 0
    max_slices: 2
    priority: 1000
    slice_template:
      gcp:
        mode: GCP_SLICE_MODE_VM
        machine_type: e2-standard-4

  tpu_v5e_16:
    zones: [europe-west4-b, us-west4-a]
    num_vms: 4
    resources:
      cpu: 128
      ram: 128GB
      disk: 1TB
      device_type: tpu
      device_variant: v5litepod-16
      device_count: 4
      preemptible: true
    min_slices: 1
    max_slices: 4
    priority: 100
    slice_template:
      gcp:
        runtime_version: v2-alpha-tpuv5-lite
