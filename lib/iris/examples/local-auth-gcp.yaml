# Iris local configuration with GCP OIDC authentication
# Usage: iris --config lib/iris/examples/local-auth-gcp.yaml cluster start --local
# Requires: gcloud auth login && gcloud auth application-default login
# The audience should match your GCP service URL or a custom audience

platform:
  local:

controller:
  local:
    port: 0  # auto-assign

auth:
  gcp:
    audience: iris-controller  # Change to your actual audience

scale_groups:
  cpu:
    num_vms: 1
    resources:
      cpu: 16
      ram: 32GB
      disk: 100GB
      device_type: cpu
      device_variant: cpu
    min_slices: 1
    max_slices: 4
    slice_template:
      num_vms: 1
      local:
