# Iris example: agent-driven workload with per-job service account
#
# For agent-driven workloads an autonomous agent submits jobs on behalf of a
# user.  To limit blast radius if the agent misbehaves, each submitted job can
# run under a narrow-scoped GCP service account instead of inheriting the
# worker VM's default SA.
#
# Usage (Python client):
#
#   job = client.submit(
#       entrypoint,
#       "agent-task",
#       resources,
#       service_account="narrow-sa@project.iam.gserviceaccount.com",
#   )
#
# When service_account is set, Iris injects
#   GOOGLE_IMPERSONATE_SERVICE_ACCOUNT=<email>
# into the task container environment.  All google-cloud-python libraries and
# gcloud CLI honour this variable and exchange the VM's default credentials for
# short-lived tokens scoped to the specified SA.
#
# Child jobs inherit the parent's service_account unless they set their own.
# Omitting the field leaves behaviour unchanged (worker VM's default SA).
#
# This file shows a minimal GCP cluster config suitable for agent workloads.
# Adjust project_id, zones, and scale_groups to match your deployment.

platform:
  label_prefix: agent
  gcp:
    project_id: your-gcp-project-id

defaults:
  autoscaler:
    evaluation_interval:
      milliseconds: 10000
    scale_up_delay:
      milliseconds: 60000
    scale_down_delay:
      milliseconds: 300000
  worker:
    docker_image: ghcr.io/marin-community/iris-worker:latest
    default_task_image: ghcr.io/marin-community/iris-task:latest
    port: 10001

storage:
  remote_state_dir: gs://your-bucket/iris/agent/state

worker_provider: {}

controller:
  image: ghcr.io/marin-community/iris-controller:latest
  gcp:
    zone: us-central1-a
    machine_type: e2-standard-4
    port: 10000

scale_groups:
  cpu_vm_e2_standard_4:
    num_vms: 1
    resources:
      cpu: 4
      ram: 16GB
      disk: 100GB
      device_type: cpu
      preemptible: false
    min_slices: 0
    max_slices: 8
    slice_template:
      gcp:
        mode: GCP_SLICE_MODE_VM
        zone: us-central1-a
        machine_type: e2-standard-4
