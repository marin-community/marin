# Iris configuration for the fresh #3821 CoreWeave experiment lane.
#
# This isolates the w13 optimization thread from the retired 3677 lane with:
# - a unique namespace,
# - a unique label_prefix,
# - a unique remote_state_dir.

platform:
  label_prefix: i3821jax
  coreweave:
    region: US-WEST-04A
    namespace: iris-3821-jax
    kubeconfig_path: ~/.kube/coreweave-iris
    object_storage_endpoint: https://74981a43be0de7712369306c7b19133d.r2.cloudflarestorage.com

storage:
  remote_state_dir: s3://marin-na/iris/state/iris-3821-jax

controller:
  image: ghcr.io/marin-community/iris-controller:latest
  coreweave:
    port: 10000
    service_name: iris-controller-svc
    scale_group: cpu-erapids

defaults:
  autoscaler:
    evaluation_interval:
      milliseconds: 10000
    scale_up_delay:
      milliseconds: 60000
    scale_down_delay:
      milliseconds: 300000
    startup_grace_period:
      milliseconds: 2400000
  worker:
    docker_image: ghcr.io/marin-community/iris-worker:latest
    port: 10001
    cache_dir: /mnt/local/iris-cache
    runtime: kubernetes
    default_task_image: ghcr.io/marin-community/iris-task:latest

scale_groups:
  cpu-erapids:
    num_vms: 1
    resources:
      cpu: 64
      ram: 256GB
      disk: 1TB
      device_type: cpu
    worker:
      attributes:
        region: US-WEST-04A
        pool: cpu-erapids
    min_slices: 0
    max_slices: 1
    priority: 50
    slice_template:
      num_vms: 1
      coreweave:
        region: US-WEST-04A
        instance_type: cd-gp-i64-erapids

  h100-8x:
    num_vms: 1
    resources:
      cpu: 128
      ram: 2048GB
      disk: 1TB
      device_type: gpu
      device_variant: H100
      device_count: 8
    worker:
      attributes:
        region: US-WEST-04A
        pool: h100-8x
    min_slices: 0
    max_slices: 1
    priority: 100
    slice_template:
      num_vms: 1
      coreweave:
        region: US-WEST-04A
        instance_type: gd-8xh100ib-i128
