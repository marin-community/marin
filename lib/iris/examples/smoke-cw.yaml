# Iris smoke-test configuration for CoreWeave (CPU-only).
#
# Mirrors examples/smoke-gcp.yaml but targets a CPU-only CoreWeave cluster.
# Used by the iris-cloud-smoke-cw GitHub Actions workflow.

platform:
  label_prefix: iris-smoke-cw
  coreweave:
    region: US-WEST-04A
    namespace: iris-smoke-cw
    kubeconfig_path: ~/.kube/coreweave-iris
    object_storage_endpoint: https://74981a43be0de7712369306c7b19133d.r2.cloudflarestorage.com

storage:
  # Default for standalone use; start-smoke overrides via marin_temp_bucket().
  remote_state_dir: s3://marin-na/iris/state/smoke-cw

kubernetes_provider:
  namespace: iris-smoke-cw
  default_image: ghcr.io/marin-community/iris-task:latest
  cache_dir: /mnt/local/iris-cache
  controller_address: http://iris-smoke-controller-svc.iris-smoke-cw.svc.cluster.local:10000

controller:
  image: ghcr.io/marin-community/iris-controller:latest
  coreweave:
    port: 10000
    service_name: iris-smoke-controller-svc
    scale_group: cpu-erapids

defaults:
  autoscaler:
    evaluation_interval:
      milliseconds: 10000
    scale_up_delay:
      milliseconds: 60000
    scale_down_delay:
      milliseconds: 300000
    startup_grace_period:
      milliseconds: 1200000    # 20 min — CPU nodes provision faster than GPUs
  worker:
    docker_image: ghcr.io/marin-community/iris-worker:latest
    port: 10001
    cache_dir: /mnt/local/iris-cache
    runtime: docker
    default_task_image: ghcr.io/marin-community/iris-task:latest

scale_groups:
  cpu-erapids:
    num_vms: 1
    resources:
      cpu: 64
      ram: 256GB
      disk: 1TB
      device_type: cpu
      preemptible: false
    worker:
      attributes:
        region: US-WEST-04A
        pool: cpu-erapids
    min_slices: 0
    max_slices: 2
    priority: 50
    slice_template:
      num_vms: 1
      coreweave:
        region: US-WEST-04A
        instance_type: cd-gp-i64-erapids
