# Iris configuration for a CPU-only CoreWeave canary.
#
# Used as a fast smoke test: boots a minimal controller with one CPU scale
# group, submits a lightweight training job, and validates the full
# submit → schedule → run → succeed lifecycle before graduating to GPU.

platform:
  label_prefix: iris-canary-cpu
  coreweave:
    region: US-WEST-04A
    namespace: iris-canary-cpu
    kubeconfig_path: ~/.kube/coreweave-iris
    object_storage_endpoint: https://74981a43be0de7712369306c7b19133d.r2.cloudflarestorage.com

storage:
  remote_state_dir: s3://marin-na/iris/state/canary-cpu

kubernetes_provider:
  namespace: iris-canary-cpu
  default_image: ghcr.io/marin-community/iris-task:latest
  controller_address: http://iris-controller-cpu-svc.iris-canary-cpu.svc.cluster.local:10000

controller:
  image: ghcr.io/marin-community/iris-controller:latest
  coreweave:
    port: 10000
    service_name: iris-controller-cpu-svc
    scale_group: cpu-erapids

defaults:
  autoscaler:
    evaluation_interval:
      milliseconds: 10000
    scale_up_delay:
      milliseconds: 30000
    scale_down_delay:
      milliseconds: 120000
    startup_grace_period:
      milliseconds: 600000    # 10 min — CPU nodes provision fast
  worker:
    docker_image: ghcr.io/marin-community/iris-worker:latest
    port: 10001
    cache_dir: /mnt/local/iris-cache
    runtime: kubernetes
    default_task_image: ghcr.io/marin-community/iris-task:latest

scale_groups:
  cpu-erapids:
    num_vms: 1
    resources:
      cpu: 64
      ram: 256GB
      disk: 1TB
      device_type: cpu
    worker:
      attributes:
        region: US-WEST-04A
        pool: cpu-erapids
    min_slices: 0
    max_slices: 1
    priority: 50
    slice_template:
      num_vms: 1
      coreweave:
        region: US-WEST-04A
        instance_type: cd-gp-i64-erapids
