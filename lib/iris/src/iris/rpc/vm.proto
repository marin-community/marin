edition = "2023";

package iris.vm;

import "time.proto";
import "config.proto";

// VM lifecycle states
enum VmState {
  VM_STATE_UNSPECIFIED = 0;
  VM_STATE_BOOTING = 1;      // VM allocated, waiting for SSH
  VM_STATE_INITIALIZING = 2; // SSH available, running bootstrap
  VM_STATE_READY = 3;        // Worker registered with controller
  VM_STATE_UNHEALTHY = 4;    // Health check failed
  VM_STATE_STOPPING = 5;     // Termination requested
  VM_STATE_TERMINATED = 6;   // VM deleted
  VM_STATE_FAILED = 7;       // Boot or init failed
  VM_STATE_PREEMPTED = 8;    // Spot/preemptible VM reclaimed
  VM_STATE_REQUESTING = 9;   // GCP API call in progress
}

// Scaling action types
enum ScalingAction {
  SCALING_ACTION_UNSPECIFIED = 0;
  SCALING_ACTION_SCALE_UP = 1;
  SCALING_ACTION_SCALE_DOWN = 2;
  SCALING_ACTION_NONE = 3;
}

message ResourceSpec {
  int32 cpu_millicores = 1;
  int64 memory_bytes = 2;
  int64 disk_bytes = 3;
  int32 gpu_count = 4;
  int32 tpu_count = 5;
}

// Information about a managed VM
message VmInfo {
  string vm_id = 1;
  string slice_id = 2;
  string scale_group = 3;
  VmState state = 4;
  string address = 5;
  string zone = 6;
  iris.time.Timestamp created_at = 7;
  iris.time.Timestamp state_changed_at = 8;

  // Worker info (populated after registration)
  string worker_id = 10;
  bool worker_healthy = 11;
  // WorkerUsability classification: "healthy" | "degraded" | "dead".
  // String vocabulary (like state/availability_status); empty when the worker
  // is not in the liveness roster. "degraded" means reachable-but-failing:
  // reconciled, but not a placement target and not reclaimable idle capacity.
  string usability = 12;

  // Initialization tracking
  string init_phase = 20;
  string init_log_tail = 21;
  string init_error = 22;

  // Running task count (populated by autoscaler status)
  int32 running_task_count = 25;

  // Labels/metadata
  map<string, string> labels = 30;
}

// A TPU slice (atomic group of VMs)
message SliceInfo {
  string slice_id = 1;
  string scale_group = 2;
  iris.time.Timestamp created_at = 3;
  repeated VmInfo vms = 4;
  string error_message = 5;

  // Idle tracking: when the slice last had active tasks (epoch_ms=0 means never active)
  iris.time.Timestamp last_active = 6;
  // True if the slice is currently eligible for scale-down (idle >= idle_threshold)
  bool idle = 7;

  // Authoritative slice lifecycle state from the autoscaler:
  // "requesting", "booting", "initializing", "ready", or "failed"
  // (same vocabulary as ScaleGroupStatus.slice_state_counts keys).
  // Clients MUST render this directly and MUST NOT infer state from `vms`:
  // `vms` is empty until the slice's workers register, so a booting slice
  // has no VMs yet. (Previously clients showed such slices as "unknown".)
  string state = 8;

  // Count of DEGRADED hosts (reachable-but-failing) among `vms`, surfaced as
  // detail. Computed in the status handler.
  int32 degraded_slot_count = 10;
  reserved 9;  // was schedulable_slot_count (host-granular; replaced by capacity_status)

  // Placement-readiness of a *ready* slice, derived in the status handler from
  // host usability + running tasks. One of:
  //   "available" — all hosts healthy, no tasks: free to place on now.
  //   "in_use"    — all hosts healthy, at least one task running.
  //   "idle"      — all hosts healthy, no tasks, idle past the scale-down
  //                 threshold (also reflected in `idle`): a scale-down candidate.
  //   "degraded"  — no hosts, or any host not healthy: not a placement target.
  // Empty for non-ready slices, whose `state` already describes them. This is
  // slice-granular: a fully-booked healthy slice is "in_use", never schedulable.
  string capacity_status = 11;
}

// A scaling decision
message ScalingDecision {
  string scale_group = 1;
  ScalingAction action = 2;
  int32 slice_delta = 3;
  string reason = 4;
}

// Runtime state of a scale group (for status API)
message ScaleGroupStatus {
  string name = 1;
  iris.config.ScaleGroupConfig config = 2;

  // Current demand
  int32 current_demand = 20;
  int32 peak_demand = 21;

  // Backoff state
  iris.time.Timestamp backoff_until = 30;
  int32 consecutive_failures = 31;

  // Rate limiting
  iris.time.Timestamp last_scale_up = 40;
  iris.time.Timestamp last_scale_down = 41;

  // Slices in this group
  repeated SliceInfo slices = 50;

  // Slice lifecycle state counts (booting, initializing, ready, failed, requesting)
  map<string, int32> slice_state_counts = 60;

  // Authoritative group availability from autoscaler routing policy
  string availability_status = 61;   // "available", "requesting", "backoff", "quota_exceeded", "at_capacity"
  string availability_reason = 62;   // Human-readable reason (for blocked states)
  iris.time.Timestamp blocked_until = 63;  // Set for temporary blocked states (backoff/quota)

  // Scale-up cooldown — set when cooldown is active (last_scale_up + cooldown > now)
  iris.time.Timestamp scale_up_cooldown_until = 70;

  // Idle threshold in milliseconds (how long a slice must be idle before scale-down)
  int64 idle_threshold_ms = 71;

  reserved 72, 73;  // were total_schedulable_slots/total_degraded_slots — host-granular
                    // rollups. The dashboard now counts slices by SliceInfo.capacity_status,
                    // which is slice-granular and excludes busy hosts from "free" capacity.
}

// Autoscaler action/event log entry
message AutoscalerAction {
  iris.time.Timestamp timestamp = 1;
  string action_type = 2;     // "scale_up", "scale_down", "quota_exceeded", "backoff_triggered", "worker_failed", "rate_limited"
  string scale_group = 3;
  string slice_id = 4;        // Empty for group-level actions
  string reason = 5;
  string status = 6;          // "pending", "completed", "failed"
}

message DemandEntryStatus {
  repeated string task_ids = 1;
  string coschedule_group_id = 2;
  reserved 3, 4;
  string device_type = 7;      // "cpu", "gpu", "tpu"
  string device_variant = 8;   // e.g. "v5p-8", "H100", or "*" for any
  bool preemptible = 5;
  ResourceSpec resources = 6;
}

message UnmetDemand {
  DemandEntryStatus entry = 1;
  string reason = 2;
}

message RoutingDecision {
  map<string, int32> group_to_launch = 1;
  map<string, string> group_reasons = 2;
  map<string, DemandEntryStatusList> routed_entries = 3;
  repeated UnmetDemand unmet_entries = 4;
  repeated GroupRoutingStatus group_statuses = 5;
}

message DemandEntryStatusList {
  repeated DemandEntryStatus entries = 1;
}

message GroupRoutingStatus {
  string group = 1;
  int32 priority = 2;
  int32 assigned = 3;
  int32 launch = 4;
  string decision = 5;  // "selected", "blocked", "requesting", "at_capacity", "idle"
  string reason = 6;
}

// Full autoscaler status (for RPC response)
message AutoscalerStatus {
  repeated ScaleGroupStatus groups = 1;
  map<string, int32> current_demand = 2;
  iris.time.Timestamp last_evaluation = 3;
  repeated AutoscalerAction recent_actions = 4;  // Last N actions (max 100)
  RoutingDecision last_routing_decision = 5;
}
