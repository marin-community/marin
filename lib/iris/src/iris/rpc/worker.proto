edition = "2023";

// Worker-specific request/response messages and the WorkerService RPC.
// Shared types (including RunTaskRequest and the heartbeat protocol) live in
// job.proto; controller-specific types live in controller.proto.
//
// Package deliberately kept as iris.cluster to preserve the wire-protocol URL
// /iris.cluster.WorkerService/... for all existing workers and the controller.
package iris.cluster;

import "job.proto";
import "time.proto";

// ============================================================================
// WORKER SERVICE MESSAGES
// ============================================================================

message Worker {
  message GetTaskStatusRequest {
    string task_id = 1;
    reserved 2;  // was include_result (removed: serialized_result no longer exists)
  }

  message ListTasksRequest {}

  message ListTasksResponse {
    repeated iris.job.TaskStatus tasks = 1;
  }

  message KillTaskRequest {
    string task_id = 1;
    iris.time.Duration term_timeout = 2;  // Time to wait for graceful termination before SIGKILL
  }

  message HealthResponse {
    bool healthy = 1;
    iris.time.Duration uptime = 2;
    int32 running_tasks = 3;        // Renamed from running_jobs
  }

  // --- Exec in Container ---
  message ExecInContainerRequest {
    string task_id = 1;             // Task whose container to exec into
    repeated string command = 2;     // Command to execute (e.g. ["bash", "-c", "ls"])
    int32 timeout_seconds = 3;      // Command timeout in seconds (0 = default 60s)
  }

  message ExecInContainerResponse {
    int32 exit_code = 1;
    string stdout = 2;
    string stderr = 3;
    string error = 4;               // Non-empty if exec setup failed
  }
}

// ============================================================================
// SERVICES
// ============================================================================

service WorkerService {
  rpc GetTaskStatus(Worker.GetTaskStatusRequest) returns (iris.job.TaskStatus);
  rpc ListTasks(Worker.ListTasksRequest) returns (Worker.ListTasksResponse);
  rpc HealthCheck(iris.job.Empty) returns (Worker.HealthResponse);
  rpc Heartbeat(iris.job.HeartbeatRequest) returns (iris.job.HeartbeatResponse);
  rpc ProfileTask(iris.job.ProfileTaskRequest) returns (iris.job.ProfileTaskResponse);

  // Process status (local process info + recent logs)
  rpc GetProcessStatus(iris.job.GetProcessStatusRequest) returns (iris.job.GetProcessStatusResponse);

  // Exec in container
  rpc ExecInContainer(Worker.ExecInContainerRequest) returns (Worker.ExecInContainerResponse);
}
