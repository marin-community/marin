edition = "2023";

// Worker-specific request/response messages and the WorkerService RPC.
// Shared types (including RunTaskRequest and WorkerTaskStatus) live in
// job.proto; controller-specific types live in controller.proto.
//
// Package deliberately kept as iris.cluster to preserve the wire-protocol URL
// /iris.cluster.WorkerService/... for all existing workers and the controller.
package iris.cluster;

import "job.proto";
import "time.proto";

// ============================================================================
// WORKER SERVICE MESSAGES
// ============================================================================

message Worker {
  message GetTaskStatusRequest {
    string task_id = 1;
    reserved 2;  // was include_result (removed: serialized_result no longer exists)
  }

  message ListTasksRequest {}

  message ListTasksResponse {
    repeated iris.job.TaskStatus tasks = 1;
  }

  message KillTaskRequest {
    string task_id = 1;
    iris.time.Duration term_timeout = 2;  // Time to wait for graceful termination before SIGKILL
  }

  message HealthResponse {
    bool healthy = 1;
    iris.time.Duration uptime = 2;
    int32 running_tasks = 3;        // Renamed from running_jobs
  }

  // --- Exec in Container ---
  message ExecInContainerRequest {
    string task_id = 1;             // Task whose container to exec into
    repeated string command = 2;     // Command to execute (e.g. ["bash", "-c", "ls"])
    int32 timeout_seconds = 3;      // Command timeout in seconds (0 = default 60s)
  }

  message ExecInContainerResponse {
    int32 exit_code = 1;
    string stdout = 2;
    string stderr = 3;
    string error = 4;               // Non-empty if exec setup failed
  }

  // --- Worker lifecycle / task RPCs ---

  message PingRequest {}
  message PingResponse {
    reserved 1;  // was: WorkerResourceSnapshot resource_snapshot (now in iris.worker stats)
    bool healthy = 2;
    string health_error = 3;
  }

  message StartTasksRequest {
    repeated iris.job.RunTaskRequest tasks = 1;
  }
  message StartTasksResponse {
    repeated TaskAck acks = 1;
  }
  message TaskAck {
    string task_id = 1;
    bool accepted = 2;
    string error = 3;
  }

  message StopTasksRequest {
    repeated string task_ids = 1;
  }
  message StopTasksResponse {}

  message PollTasksRequest {
    repeated iris.job.WorkerTaskStatus expected_tasks = 1;
  }
  message PollTasksResponse {
    repeated iris.job.WorkerTaskStatus tasks = 1;
  }

  // ============================================================
  // RECONCILE RPC (controller -> worker, unary)
  // ============================================================

  message ReconcileRequest {
    string worker_id = 1;
    repeated DesiredAttempt desired = 2;        // complete expected set
  }

  message ReconcileResponse {
    string worker_id = 1;
    repeated AttemptObservation observed = 2;   // complete observed set
    WorkerHealth health = 3;
  }

  message DesiredAttempt {
    // Routing key. 16 hex chars (128-bit random). Set in Phase C+;
    // empty in Phase B (recipient routes by task_id+attempt_id then).
    string attempt_uid = 1;

    oneof intent {
      AttemptSpec run = 10;
      StopReason stop = 11;
    }

    // Phase-B compat: legacy composite key.
    string task_id = 100;
    int32 attempt_id = 101;
  }

  message AttemptSpec {
    // Populated only when the DB attempt state is ASSIGNED (the one
    // dispatch tick that hands the worker the spec). Omitted on every
    // subsequent tick — the worker is expected to have it cached.
    iris.job.RunTaskRequest request = 1;
  }

  message AttemptObservation {
    string attempt_uid = 1;

    iris.job.TaskState state = 2;
    int32 exit_code = 3;
    string error = 4;
    string container_id = 5;
    iris.time.Timestamp finished_at = 6;
    iris.job.ResourceUsage resource_usage = 7;

    // Phase-B compat: legacy composite key.
    string task_id = 100;
    int32 attempt_id = 101;
  }

  enum StopReason {
    STOP_REASON_UNSPECIFIED = 0;
    STOP_REASON_CANCELLED = 1;
    STOP_REASON_PREEMPTED = 2;
    STOP_REASON_SUPERSEDED = 3;
    STOP_REASON_JOB_TERMINATED = 4;
    STOP_REASON_TASK_TIMEOUT = 5;
    STOP_REASON_WORKER_DRAIN = 6;
  }

  message WorkerHealth {
    bool healthy = 1;
    string health_error = 2;
    iris.job.WorkerResourceSnapshot resources = 3;
  }
}

// ============================================================================
// SERVICES
// ============================================================================

service WorkerService {
  rpc GetTaskStatus(Worker.GetTaskStatusRequest) returns (iris.job.TaskStatus);
  rpc ListTasks(Worker.ListTasksRequest) returns (Worker.ListTasksResponse);
  rpc HealthCheck(iris.job.Empty) returns (Worker.HealthResponse);
  rpc ProfileTask(iris.job.ProfileTaskRequest) returns (iris.job.ProfileTaskResponse);

  // Process status (local process info + recent logs)
  rpc GetProcessStatus(iris.job.GetProcessStatusRequest) returns (iris.job.GetProcessStatusResponse);

  // Exec in container
  rpc ExecInContainer(Worker.ExecInContainerRequest) returns (Worker.ExecInContainerResponse);

  // --- Worker lifecycle / task RPCs (controller -> worker) ---
  rpc Ping(Worker.PingRequest) returns (Worker.PingResponse);
  rpc StartTasks(Worker.StartTasksRequest) returns (Worker.StartTasksResponse);
  rpc StopTasks(Worker.StopTasksRequest) returns (Worker.StopTasksResponse);
  rpc PollTasks(Worker.PollTasksRequest) returns (Worker.PollTasksResponse);
  // Reconcile RPC (Phase B+): controller -> worker, unary.
  // Legacy RPCs (StartTasks / StopTasks / PollTasks / Ping) kept through Phase D.
  rpc Reconcile(Worker.ReconcileRequest) returns (Worker.ReconcileResponse);
}
