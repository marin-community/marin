edition = "2023";

package iris.cluster;

import "time.proto";
import "vm.proto";
import "logging.proto";

// ============================================================================
// SHARED TYPES
// ============================================================================

message Empty {}

// --- Profiling ---
// Shared by both ControllerService and WorkerService (controller proxies to worker).

// CPU profiling configuration (py-spy)
message CpuProfile {
  enum Format {
    FORMAT_UNSPECIFIED = 0;
    FLAMEGRAPH = 1;     // SVG flamegraph
    SPEEDSCOPE = 2;     // JSON for speedscope viewer
    RAW = 3;            // Text output
  }
  Format format = 1;
  int32 rate_hz = 2;    // Sample rate (default: 100)
}

// Memory profiling configuration (memray)
message MemoryProfile {
  enum Format {
    FORMAT_UNSPECIFIED = 0;
    FLAMEGRAPH = 1;     // HTML flamegraph with memory timeline
    TABLE = 2;          // Text summary table
    STATS = 3;          // JSON statistics
  }
  Format format = 1;
  bool leaks = 2;       // Focus on potential memory leaks
}

// Thread dump configuration (no additional options needed)
message ThreadsProfile {}

// Profile type selector
message ProfileType {
  oneof profiler {
    CpuProfile cpu = 1;
    MemoryProfile memory = 2;
    ThreadsProfile threads = 3;
  }
}

message ProfileTaskRequest {
  // Target to profile. Accepts either:
  //   /job/name/task/0             - task (uses current/latest attempt)
  //   /job/name/task/0:attempt_id  - specific task attempt (optional)
  //   /system/process              - the local process (worker or controller)
  string target = 4;
  int32 duration_seconds = 2;   // How long to sample (default: 10)
  ProfileType profile_type = 3;

  reserved 1;  // was task_id, replaced by target
}

message ProfileTaskResponse {
  bytes profile_data = 1;       // SVG/JSON/HTML/text output
  string error = 2;             // Non-empty if profiling failed
}

// Unified log fetching request, shared by controller and worker services.
// The source key identifies the log stream:
//   /system/process                - local process logs (controller or worker)
//   /job/name/task/0:0      - task attempt logs (task_wire:attempt_id)
message FetchLogsRequest {
  string source = 1;           // Log source key
  int64 since_ms = 2;          // Only return entries after this timestamp (exclusive)
  int64 cursor = 3;            // Autoincrement id cursor (resume after this id)
  string substring = 4;        // Substring filter on log data (matched via SQL LIKE)
  int32 max_lines = 5;         // Max entries to return (0 = default 1000)
  bool tail = 6;               // Return last N entries instead of first N
  string min_level = 7;        // Minimum log level (DEBUG/INFO/WARNING/ERROR/CRITICAL)
}

message FetchLogsResponse {
  repeated iris.logging.LogEntry entries = 1;
  int64 cursor = 2;            // Max autoincrement id seen (cursor for next poll)
}

// --- Process Status ---
// Shared by both ControllerService and WorkerService.
// Returns local process info (host, resource usage) and recent process logs.

message ProcessInfo {
  string hostname = 1;
  int32 pid = 2;
  string python_version = 3;
  int64 uptime_ms = 4;          // Process uptime in milliseconds
  int64 memory_rss_bytes = 5;   // Resident set size
  int64 memory_vms_bytes = 6;   // Virtual memory size
  float cpu_percent = 7;        // CPU utilization (0-100)
  int32 thread_count = 8;
  int32 open_fd_count = 9;      // Open file descriptors
  int64 memory_total_bytes = 10; // Total system memory
  int32 cpu_count = 11;          // Number of CPU cores
  string git_hash = 12;          // Git commit hash baked in at image build time (IRIS_GIT_HASH)
}

message GetProcessStatusRequest {
  int32 max_log_lines = 1;     // Max log entries to include (0 = default 200)
  string log_substring = 2;    // Substring filter for logs
  string min_log_level = 3;    // Minimum log level filter

  // Target process. Uses the same naming convention as profiling/logs:
  //   /system/process              - the local process (default if empty)
  //   /system/worker/<worker_id>   - proxy to a specific worker
  string target = 4;
}

message GetProcessStatusResponse {
  ProcessInfo process_info = 1;
  repeated iris.logging.LogEntry log_entries = 2;
}

enum JobState {
  JOB_STATE_UNSPECIFIED = 0;
  JOB_STATE_PENDING = 1;
  JOB_STATE_BUILDING = 2;
  JOB_STATE_RUNNING = 3;
  JOB_STATE_SUCCEEDED = 4;
  JOB_STATE_FAILED = 5;
  JOB_STATE_KILLED = 6;
  JOB_STATE_WORKER_FAILED = 7;
  JOB_STATE_UNSCHEDULABLE = 8;  // Couldn't be scheduled within timeout
}

// Task state mirrors job state - a task is a single unit of execution within a job
enum TaskState {
  TASK_STATE_UNSPECIFIED = 0;
  TASK_STATE_PENDING = 1;
  TASK_STATE_BUILDING = 2;
  TASK_STATE_RUNNING = 3;
  TASK_STATE_SUCCEEDED = 4;
  TASK_STATE_FAILED = 5;
  TASK_STATE_KILLED = 6;
  TASK_STATE_WORKER_FAILED = 7;
  TASK_STATE_UNSCHEDULABLE = 8;
  TASK_STATE_ASSIGNED = 9;
}

// Status of a single task within a job
message TaskStatus {
  string task_id = 1;                 // "/job/full/path/with/task/0"
  TaskState state = 4;

  string worker_id = 5;
  string worker_address = 6;

  int32 exit_code = 7;
  string error = 8;

  iris.time.Timestamp started_at = 9;
  iris.time.Timestamp finished_at = 10;

  map<string, int32> ports = 11;      // Per-task port allocations
  ResourceUsage resource_usage = 12;
  BuildMetrics build_metrics = 13;

  int32 current_attempt_id = 14;
  repeated TaskAttempt attempts = 15;

  // Scheduling diagnostics for pending tasks (dashboard display)
  string pending_reason = 16;         // Why task can't be scheduled (empty if schedulable)
  bool can_be_scheduled = 17;         // Whether task is currently schedulable
  // field 18 was log_directory, removed
}

// Record of a single task execution attempt
message TaskAttempt {
  int32 attempt_id = 1;
  string worker_id = 2;
  TaskState state = 3;
  int32 exit_code = 4;
  string error = 5;
  iris.time.Timestamp started_at = 6;
  iris.time.Timestamp finished_at = 7;
  bool is_worker_failure = 8;
}

message ResourceUsage {
  int64 memory_mb = 1;
  int64 disk_mb = 2;
  int32 cpu_millicores = 3;
  int64 memory_peak_mb = 4;
  int32 cpu_percent = 5;
  int32 process_count = 6;
}

// Host-level resource snapshot collected by the worker during each heartbeat.
message WorkerResourceSnapshot {
  iris.time.Timestamp timestamp = 1;
  // Host CPU utilization as percentage (0-100 averaged across cores)
  int32 cpu_percent = 2;
  // Host memory
  int64 memory_used_bytes = 3;
  int64 memory_total_bytes = 4;
  // Host disk (primary mount)
  int64 disk_used_bytes = 5;
  int64 disk_total_bytes = 6;
  // Aggregate task stats
  int32 running_task_count = 7;
  int32 total_process_count = 8;
  // Network bandwidth (bytes/sec, computed as delta between heartbeats)
  int64 net_recv_bps = 9;
  int64 net_sent_bps = 10;
}

message BuildMetrics {
  iris.time.Timestamp build_started = 1;
  iris.time.Timestamp build_finished = 2;
  bool from_cache = 3;
  string image_tag = 4;
}

message JobStatus {
  string job_id = 1;
  JobState state = 2;
  int32 exit_code = 3;
  string error = 4;
  iris.time.Timestamp started_at = 5;
  iris.time.Timestamp finished_at = 6;

  // Port allocations
  map<string, int32> ports = 7;

  ResourceUsage resource_usage = 8;

  // Status message for current phase (e.g., "downloading bundle", "populating uv cache")
  string status_message = 9;

  BuildMetrics build_metrics = 10;

  reserved 13;  // was serialized_result (removed: dead store, never populated)

  int32 failure_count = 17;                // Total task failures (aggregated)
  int32 preemption_count = 18;             // Total task preemptions (aggregated)

  repeated TaskStatus tasks = 24;          // Per-task status (always included)

  // Job metadata from request (for dashboard display)
  string name = 25;                        // Job name from request
  iris.time.Timestamp submitted_at = 26;

  // Resource specification from job request (for dashboard display)
  ResourceSpecProto resources = 27;

  // Aggregated task state counts: {"running": 2, "pending": 5, "succeeded": 10}
  map<string, int32> task_state_counts = 28;

  // Convenience counts (could derive from task_state_counts)
  int32 task_count = 29;
  int32 completed_count = 30;

  // Diagnostic message for pending/failed jobs (e.g., "No workers match constraint: gpu=true")
  string pending_reason = 31;
}

// JobAttempt message removed: Jobs don't have attempts - tasks do.
// Job state is derived from task states, and retry semantics are per-task.

// ============================================================================
// RESERVATION
// ============================================================================

// A single reservation entry describing one worker's worth of resources.
// Duplicate entries to reserve multiple workers of the same type.
message ReservationEntry {
  // Resource spec for one worker.
  ResourceSpecProto resources = 1;

  // Constraints for routing (region, zone, preemptible, etc.).
  repeated Constraint constraints = 2;
}

// Reservation configuration attached to a job. The autoscaler pre-provisions
// capacity and the reserving job is held pending until all entries are fulfilled.
message ReservationConfig {
  // Resource entries to reserve. Each entry = one worker.
  repeated ReservationEntry entries = 1;
}

// ============================================================================
// RESOURCE SPECIFICATION
// ============================================================================

// Device configuration - used in ResourceSpecProto
message DeviceConfig {
  oneof device {
    CpuDevice cpu = 1;
    GpuDevice gpu = 2;
    TpuDevice tpu = 3;
  }
}

message CpuDevice {
  string variant = 1;  // Always "cpu"
}

message GpuDevice {
  string variant = 1;  // e.g., "A100", "H100", "auto"
  int32 count = 2;     // Number of GPUs
}

message TpuDevice {
  string variant = 1;       // e.g., "v5litepod-16", "v4-8"
  string topology = 2;      // topology spec (e.g., "2x2x1")
  int32 count = 3;          // Number of TPU chips on this worker
}

// Unified resource specification for jobs
// Used by both controller (for scheduling) and worker (for enforcement)
// All resource quantities are in machine-readable units (bytes, cores).
// Clients should create a ResourceSpec dataclass and call .to_proto().
message ResourceSpecProto {
  // Compute resources
  int32 cpu_millicores = 1;   // CPU in millicores (1000 = 1 core)
  int64 memory_bytes = 4;     // RAM in bytes
  int64 disk_bytes = 9;       // Disk space in bytes

  // Device configuration
  DeviceConfig device = 5;
}

// ============================================================================
// ENVIRONMENT CONFIGURATION
// ============================================================================

// Job environment configuration
message EnvironmentConfig {
  repeated string pip_packages = 1;  // Additional pip packages to install
  map<string, string> env_vars = 2;  // Environment variables to set
  repeated string extras = 3;         // Extra dependency groups for uv (e.g., ["tpu", "eval"])
  string python_version = 4;         // Client Python version (e.g., "3.11") for task container base image
  string dockerfile = 5;             // Pre-generated Dockerfile content (generated by client, used by worker)
}

// ============================================================================
// ENTRYPOINT
// ============================================================================

// Command-line entrypoint for script execution.
message CommandEntrypoint {
  repeated string argv = 1;  // e.g., ["python", "train.py", "--epochs", "10"]
}

// Structured entrypoint for the runtime layer. Separates environment setup
// from the actual user command so runtimes can handle them differently
// (e.g., process runtime skips setup since host env is already configured).
message RuntimeEntrypoint {
  // Shell commands to set up the environment (uv sync, pip install, venv activation).
  // Executed in order before run_command. Runtimes that don't need env setup skip these.
  repeated string setup_commands = 1;

  // The user's actual command to execute.
  CommandEntrypoint run_command = 2;

  // Files to write to $IRIS_WORKDIR/{key} before execution.
  map<string, bytes> workdir_files = 3;
}

// ============================================================================
// WORKER ATTRIBUTES
// ============================================================================

// Typed attribute value for worker attributes and constraint matching.
// Workers report attributes (e.g., tpu-name, tpu-worker-id) at registration.
// Jobs can filter workers using constraints on these attributes.
message AttributeValue {
  oneof value {
    string string_value = 1;
    int64 int_value = 2;
    double float_value = 3;
  }
}

// Constraint operators for filtering workers by attributes.
enum ConstraintOp {
  CONSTRAINT_OP_EQ = 0;         // Attribute equals value
  CONSTRAINT_OP_NE = 1;         // Attribute not equals value
  CONSTRAINT_OP_EXISTS = 2;     // Attribute exists (value ignored)
  CONSTRAINT_OP_NOT_EXISTS = 3; // Attribute does not exist (value ignored)
  CONSTRAINT_OP_GT = 4;         // Attribute greater than value (numeric)
  CONSTRAINT_OP_GE = 5;         // Attribute greater than or equal to value (numeric)
  CONSTRAINT_OP_LT = 6;         // Attribute less than value (numeric)
  CONSTRAINT_OP_LE = 7;         // Attribute less than or equal to value (numeric)
  CONSTRAINT_OP_IN = 8;         // Attribute value is in the provided set (disjunction)
}

// Whether a constraint is hard (required) or soft (preferred).
// Hard constraints filter workers: non-matching workers are excluded.
// Soft constraints rank workers: matching workers are preferred but
// non-matching workers are still eligible.
enum ConstraintMode {
  CONSTRAINT_MODE_REQUIRED = 0;  // Hard constraint (default, backwards-compatible)
  CONSTRAINT_MODE_PREFERRED = 1; // Soft constraint: prefer matching, allow non-matching
}

// Constraint for filtering workers by attribute.
// Used in LaunchJobRequest to specify which workers can run a job.
message Constraint {
  string key = 1;           // Attribute key to match (e.g., "tpu-name")
  ConstraintOp op = 2;      // Comparison operator
  AttributeValue value = 3; // Value to compare against (ignored for EXISTS/NOT_EXISTS)
  repeated AttributeValue values = 4; // Set of values for IN operator
  ConstraintMode mode = 5;  // Hard (default) or soft
}

// Coscheduling configuration for multi-host jobs.
// When set, all tasks in the job must be scheduled atomically onto workers
// that share the same value for the specified group_by attribute.
message CoschedulingConfig {
  string group_by = 1;  // Attribute key to group workers by (e.g., "tpu-name")
}

// ============================================================================
// WORKER METADATA
// ============================================================================

// Typed metadata about a worker's environment, collected at registration.
message WorkerMetadata {
  // Basic compute resources
  string hostname = 1;
  string ip_address = 2;
  int32 cpu_count = 3;
  int64 memory_bytes = 4;
  int64 disk_bytes = 5;
  DeviceConfig device = 6;

  // TPU environment (from TPU_* env vars)
  string tpu_name = 10;                    // TPU_NAME
  string tpu_worker_hostnames = 11;        // TPU_WORKER_HOSTNAMES
  string tpu_worker_id = 12;               // TPU_WORKER_ID
  string tpu_chips_per_host_bounds = 13;   // TPU_CHIPS_PER_HOST_BOUNDS

  // GPU info (from nvidia-smi)
  int32 gpu_count = 20;
  string gpu_name = 21;
  int32 gpu_memory_mb = 22;

  // GCE instance metadata
  string gce_instance_name = 30;
  string gce_zone = 31;

  // Worker attributes for constraint-based scheduling.
  // Standard attributes include:
  //   tpu-name: TPU slice name (string)
  //   tpu-worker-id: Worker ID within slice (int)
  //   tpu-topology: TPU topology variant, e.g. "v5litepod-16" (string)
  //   tpu-vm-count: Number of VMs in the TPU slice (int)
  // Additional attributes can be set via IRIS_WORKER_ATTRIBUTES env var
  // using format: key1=value1,key2=value2 (e.g., taint:maintenance=true,pool=large-jobs)
  map<string, AttributeValue> attributes = 40;

  // DEPRECATED: No longer used for worker identification.
  // Worker identity is now set via RegisterRequest.worker_id.
  // Field kept for proto wire compatibility but ignored by the controller.
  string vm_address = 41;

  // Git commit hash baked into the worker image at build time (IRIS_GIT_HASH).
  // Allows the controller to surface per-worker version info for debugging.
  string git_hash = 42;
}

// ============================================================================
// CONTROLLER SERVICE MESSAGES
// ============================================================================

message Controller {
  // --- Job Lifecycle ---
  message LaunchJobRequest {
    string name = 1;
    RuntimeEntrypoint entrypoint = 2;       // Structured entrypoint for runtime layer
    ResourceSpecProto resources = 3;        // Full resource specification
    EnvironmentConfig environment = 4;  // Environment configuration

    // Bundle information - either provide bundle_id OR blob (not both)
    string bundle_id = 5;  // Canonical bundle identifier (SHA256 of zip bytes)
    bytes bundle_blob = 6;  // Direct bundle upload (controller writes to bundle store)

    // Scheduling timeout - job fails with UNSCHEDULABLE if not scheduled within this time
    // If not set or milliseconds=0, no timeout (wait forever)
    iris.time.Duration scheduling_timeout = 8;

    // Named ports to allocate (e.g., ["http", "grpc", "actor"])
    // Worker allocates ports and injects FLUSTER_PORT_<NAME> env vars into the container
    repeated string ports = 9;

    // Job-level failure tolerance
    // A job fails when this many tasks have exhausted their retries (default 0 = fail on first task failure)
    // Preemptions do not count toward this limit
    int32 max_task_failures = 11;

    // Per-task retry limits
    // When a task fails (non-zero exit code), retry up to this many times before marking permanently failed
    int32 max_retries_failure = 12;  // Default: 0 (no retries on task failure)

    // When a task is preempted (worker dies), retry up to this many times
    int32 max_retries_preemption = 13;  // Default: 100 (generous preemption tolerance)

    // Constraints for filtering workers by attribute.
    // All constraints must match for a worker to be eligible (AND semantics).
    repeated Constraint constraints = 14;

    // Coscheduling configuration for multi-host jobs (e.g., multi-host TPU).
    // When set, all tasks are scheduled atomically to workers sharing the same
    // group_by attribute value. If not enough workers are available in any group,
    // the job stays pending.
    CoschedulingConfig coscheduling = 15;

    // Number of tasks to create for gang scheduling (default: 1).
    // For multi-host TPU jobs, set to the number of VMs in the slice.
    int32 replicas = 20;

    // Per-task timeout. Task is killed if it runs longer than this.
    // If not set or milliseconds=0, no timeout.
    iris.time.Duration timeout = 21;

    // If true, return ALREADY_EXISTS error even if an existing job with the same
    // name is in a terminal state. If false (default), finished jobs are automatically
    // removed and replaced with the new submission.
    bool fail_if_exists = 22;

    // Resource reservation. When set, the autoscaler pre-provisions capacity
    // and the reserving job is held pending until the reservation is satisfied.
    ReservationConfig reservation = 30;
  }

  message LaunchJobResponse {
    string job_id = 1;
  }

  message GetJobStatusRequest {
    string job_id = 1;
    reserved 2;  // was include_result (removed: serialized_result no longer exists)
  }

  message GetJobStatusResponse {
    JobStatus job = 1;
    LaunchJobRequest request = 2;  // Original job request for debugging
  }

  message TerminateJobRequest {
    string job_id = 1;
  }

  // Sort fields for job listing
  enum JobSortField {
    JOB_SORT_FIELD_UNSPECIFIED = 0;
    JOB_SORT_FIELD_DATE = 1;     // submitted_at_ms
    JOB_SORT_FIELD_NAME = 2;
    JOB_SORT_FIELD_STATE = 3;
    JOB_SORT_FIELD_FAILURES = 4;
    JOB_SORT_FIELD_PREEMPTIONS = 5;
  }

  enum SortDirection {
    SORT_DIRECTION_UNSPECIFIED = 0;  // Default to descending for date, ascending for others
    SORT_DIRECTION_ASC = 1;
    SORT_DIRECTION_DESC = 2;
  }

  message ListJobsRequest {
    // Pagination
    int32 offset = 1;   // Skip first N jobs (default: 0)
    int32 limit = 2;    // Max jobs to return (default: 50, max: 500)

    // Sorting (default: date descending)
    JobSortField sort_field = 3;
    SortDirection sort_direction = 4;

    // Filtering
    string name_filter = 5;  // Filter by job name (substring match)
    string state_filter = 6; // Filter by state (exact match, e.g., "running")
  }

  message ListJobsResponse {
    repeated JobStatus jobs = 1;

    // Pagination info
    int32 total_count = 2;  // Total jobs matching filters (before pagination)
    bool has_more = 3;      // More jobs available after this page
  }

  // --- Task Operations ---
  message GetTaskStatusRequest {
    string task_id = 1;
  }

  message GetTaskStatusResponse {
    TaskStatus task = 1;
  }

  message ListTasksRequest {
    string job_id = 1;
  }

  message ListTasksResponse {
    repeated TaskStatus tasks = 1;
  }

  // --- Worker Management ---
  message WorkerInfo {
    string worker_id = 1;
    string address = 2;              // host:port for WorkerService
    WorkerMetadata metadata = 3;
    iris.time.Timestamp registered_at = 4;
  }

  // Lean task status reported by the worker during heartbeat.
  // Covers both running and completed tasks in a single type.
  message WorkerTaskStatus {
    string task_id = 1;
    int32 attempt_id = 2;
    TaskState state = 3;
    int32 exit_code = 4;
    string error = 5;
    iris.time.Timestamp finished_at = 6;
    // field 7 was log_directory, removed
    ResourceUsage resource_usage = 8;
    // Delta log entries since last heartbeat (capped per heartbeat)
    repeated iris.logging.LogEntry log_entries = 9;
  }


  message WorkerHealthStatus {
    string worker_id = 1;
    bool healthy = 2;
    int32 consecutive_failures = 3;
    iris.time.Timestamp last_heartbeat = 4;
    repeated string running_job_ids = 5;
    string address = 6;                    // Worker RPC address (host:port)
    WorkerMetadata metadata = 7;           // Full worker metadata
    string status_message = 8;             // Error or status message (e.g., "Heartbeat timeout", "Worker crashed")
  }

  message ListWorkersRequest {}

  message ListWorkersResponse {
    repeated WorkerHealthStatus workers = 1;
  }

  message RegisterRequest {
    string address = 1;
    WorkerMetadata metadata = 2;
    // Worker ID assigned by the autoscaler via WorkerConfig.
    // When set, the controller uses this as the canonical worker identity
    // instead of deriving it from vm_address.
    string worker_id = 3;
  }

  message RegisterResponse {
    string worker_id = 1;
    bool accepted = 2;
  }

  // --- Endpoint Registry ---
  // Endpoints are registered with prefixed names: "{root_job_id}/{actor_name}"
  message Endpoint {
    string endpoint_id = 1;
    string name = 2;                 // Full prefixed name: "abc123/my-actor"
    string address = 3;              // host:port
    string task_id = 4;              // Wire-format task ID (e.g. "/user/job/0")
    map<string, string> metadata = 5;
  }

  message RegisterEndpointRequest {
    string name = 1;                 // Full prefixed name: "abc123/my-actor"
    string address = 2;
    string task_id = 3;              // Wire-format task ID (e.g. "/user/job/0")
    map<string, string> metadata = 4;
    int32 attempt_id = 5;            // Attempt number for stale endpoint cleanup
    string endpoint_id = 6;          // Client-generated UUID for idempotency; server generates one if empty.
  }

  message RegisterEndpointResponse {
    string endpoint_id = 1;
  }

  message UnregisterEndpointRequest {
    string endpoint_id = 1;
  }

  message ListEndpointsRequest {
    string prefix = 1;               // Prefix to match: "abc123/" or "abc123/my-actor"
    bool exact = 2;                  // If true, match prefix as an exact name instead
  }

  message ListEndpointsResponse {
    repeated Endpoint endpoints = 1;
  }

  // --- Autoscaler ---
  message GetAutoscalerStatusRequest {}

  message GetAutoscalerStatusResponse {
    iris.vm.AutoscalerStatus status = 1;
  }

  // --- Transactions / Actions Log ---
  message TransactionAction {
    iris.time.Timestamp timestamp = 1;
    string action = 2;
    string entity_id = 3;
    string details = 4;
  }

  message GetTransactionsRequest {
    int32 limit = 1;  // 0 = default (50)
  }

  message GetTransactionsResponse {
    repeated TransactionAction actions = 1;
  }

  // --- Checkpoint ---
  message BeginCheckpointRequest {}
  message BeginCheckpointResponse {
    string checkpoint_path = 1;
    iris.time.Timestamp created_at = 2;
    int32 job_count = 3;
    int32 task_count = 4;
    int32 worker_count = 5;
  }

  message UserSummary {
    string user = 1;
    map<string, int32> task_state_counts = 2;
    map<string, int32> job_state_counts = 3;
  }

  message ListUsersRequest {}

  message ListUsersResponse {
    repeated UserSummary users = 1;
  }

  // --- Task/Job Logs (batch fetching) ---
  message GetTaskLogsRequest {
    string id = 1;                   // Job ID or Task ID (detected by trailing numeric)
    bool include_children = 2;       // Include child jobs (only for job IDs)
    int64 since_ms = 3;              // Only return logs after this timestamp (exclusive)
    int64 max_total_lines = 4;       // Max lines total (0 = default 10000)
    string substring = 5;             // Substring filter (matched via SQL LIKE)
    int32 attempt_id = 6;            // Filter to specific attempt (-1 = all attempts)
    string min_level = 7;            // Minimum log level filter (DEBUG/INFO/WARNING/ERROR/CRITICAL)
    int64 cursor = 8;               // Autoincrement id cursor for incremental polling
    bool tail = 9;                  // If true, return the last N lines instead of the first N
  }

  message TaskLogBatch {
    string task_id = 1;
    repeated iris.logging.LogEntry logs = 2;
    string error = 3;                // If fetch failed for this task
    string worker_id = 4;            // Worker that produced these logs
  }

  message GetTaskLogsResponse {
    repeated TaskLogBatch task_logs = 1;
    bool truncated = 2;              // True if max_total_lines hit

    // Child job statuses (populated when include_children=true).
    // Included on every response so the client can detect state transitions
    // (e.g. child moved to FAILED) without a separate ListJobs RPC.
    repeated JobStatus child_job_statuses = 3;

    int64 cursor = 4;               // Max autoincrement id seen (cursor for next poll)
  }

  // --- Worker Detail (unified VM + worker view) ---
  message GetWorkerStatusRequest {
    string id = 1;  // VM ID or worker ID — resolved against both
  }

  message GetWorkerStatusResponse {
    // VM info (null if identifier matched a worker with no VM)
    iris.vm.VmInfo vm = 1;
    string scale_group = 2;

    // Worker health (null if no worker registered)
    WorkerHealthStatus worker = 3;

    // Bootstrap logs (from VM init)
    string bootstrap_logs = 4;

    // Worker daemon logs (proxied from worker via FetchLogs, empty if unhealthy/absent)
    repeated iris.logging.LogEntry worker_log_entries = 9;

    reserved 5;  // was: repeated ProcessLogRecord worker_logs

    // Recent tasks that ran or are running on this worker (newest first)
    repeated TaskStatus recent_tasks = 6;

    // Current host-level resource snapshot (from latest heartbeat)
    WorkerResourceSnapshot current_resources = 7;

    // Recent resource history (ring buffer of snapshots from heartbeats)
    repeated WorkerResourceSnapshot resource_history = 8;
  }

}

// ============================================================================
// WORKER SERVICE MESSAGES
// ============================================================================

message Worker {
  message RunTaskRequest {
    string task_id = 1;             // Full task ID: "/job/full/path/with/task/0"
    int32 num_tasks = 2;            // Total tasks in job (for IRIS_NUM_TASKS)

    RuntimeEntrypoint entrypoint = 3;  // Structured entrypoint for runtime layer
    EnvironmentConfig environment = 4;
    string bundle_id = 5;
    ResourceSpecProto resources = 6;
    iris.time.Duration timeout = 7;
    repeated string ports = 8;
    int32 attempt_id = 9;
    repeated Constraint constraints = 10; // Original job constraints for child-job inheritance metadata
  }

  message GetTaskStatusRequest {
    string task_id = 1;
    reserved 2;  // was include_result (removed: serialized_result no longer exists)
  }

  message ListTasksRequest {}

  message ListTasksResponse {
    repeated TaskStatus tasks = 1;
  }

  message KillTaskRequest {
    string task_id = 1;
    iris.time.Duration term_timeout = 2;  // Time to wait for graceful termination before SIGKILL
  }

  message HealthResponse {
    bool healthy = 1;
    iris.time.Duration uptime = 2;
    int32 running_tasks = 3;        // Renamed from running_jobs
  }

}

// ============================================================================
// HEARTBEAT MESSAGES (Controller -> Worker)
// ============================================================================

message HeartbeatRequest {
  // Tasks to start on this worker
  repeated Worker.RunTaskRequest tasks_to_run = 1;

  // Tasks to kill on this worker
  repeated string tasks_to_kill = 2;

  // Tasks the controller believes this worker is running.
  // Worker compares against its actual state and reports completions/failures.
  repeated Controller.WorkerTaskStatus expected_tasks = 3;
}

message HeartbeatResponse {
  // All tasks known to the worker (running + recently completed), reported as a
  // single unified list.  Replaces the former running_tasks + completed_tasks split.
  repeated Controller.WorkerTaskStatus tasks = 4;

  // Current host-level resource snapshot
  WorkerResourceSnapshot resource_snapshot = 3;

  // Worker health status. When false, the worker has detected a local fault
  // (disk full, cannot write tempfile, etc.) and should be immediately
  // marked as permanently failed by the controller.
  bool worker_healthy = 5;

  // Human-readable description of the health check failure.
  string health_error = 6;
}

// ============================================================================
// SERVICES
// ============================================================================

service ControllerService {
  // Job lifecycle
  rpc LaunchJob(Controller.LaunchJobRequest) returns (Controller.LaunchJobResponse);
  rpc GetJobStatus(Controller.GetJobStatusRequest) returns (Controller.GetJobStatusResponse);
  rpc TerminateJob(Controller.TerminateJobRequest) returns (Empty);
  rpc ListJobs(Controller.ListJobsRequest) returns (Controller.ListJobsResponse);

  // Task operations
  rpc GetTaskStatus(Controller.GetTaskStatusRequest) returns (Controller.GetTaskStatusResponse);
  rpc ListTasks(Controller.ListTasksRequest) returns (Controller.ListTasksResponse);

  // Worker management
  rpc Register(Controller.RegisterRequest) returns (Controller.RegisterResponse);
  rpc ListWorkers(Controller.ListWorkersRequest) returns (Controller.ListWorkersResponse);
  // Endpoint registry (generic service discovery)
  rpc RegisterEndpoint(Controller.RegisterEndpointRequest) returns (Controller.RegisterEndpointResponse);
  rpc UnregisterEndpoint(Controller.UnregisterEndpointRequest) returns (Empty);
  rpc ListEndpoints(Controller.ListEndpointsRequest) returns (Controller.ListEndpointsResponse);

  // Autoscaler
  rpc GetAutoscalerStatus(Controller.GetAutoscalerStatusRequest) returns (Controller.GetAutoscalerStatusResponse);

  // Transactions / Actions Log
  rpc GetTransactions(Controller.GetTransactionsRequest) returns (Controller.GetTransactionsResponse);

  rpc ListUsers(Controller.ListUsersRequest) returns (Controller.ListUsersResponse);

  // Task logs (proxied to worker)
  rpc GetTaskLogs(Controller.GetTaskLogsRequest) returns (Controller.GetTaskLogsResponse);

  // Unified log fetching (process logs, task logs, etc. by key)
  rpc FetchLogs(FetchLogsRequest) returns (FetchLogsResponse);

  // Profiling (proxied to worker)
  rpc ProfileTask(ProfileTaskRequest) returns (ProfileTaskResponse);

  // Unified worker detail (VM + worker + logs in one call)
  rpc GetWorkerStatus(Controller.GetWorkerStatusRequest) returns (Controller.GetWorkerStatusResponse);

  // Checkpoint
  rpc BeginCheckpoint(Controller.BeginCheckpointRequest) returns (Controller.BeginCheckpointResponse);

  // Process status (local process info + recent logs)
  rpc GetProcessStatus(GetProcessStatusRequest) returns (GetProcessStatusResponse);
}

service WorkerService {
  rpc GetTaskStatus(Worker.GetTaskStatusRequest) returns (TaskStatus);
  rpc ListTasks(Worker.ListTasksRequest) returns (Worker.ListTasksResponse);
  rpc HealthCheck(Empty) returns (Worker.HealthResponse);
  rpc FetchLogs(FetchLogsRequest) returns (FetchLogsResponse);
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
  rpc ProfileTask(ProfileTaskRequest) returns (ProfileTaskResponse);

  // Process status (local process info + recent logs)
  rpc GetProcessStatus(GetProcessStatusRequest) returns (GetProcessStatusResponse);
}
