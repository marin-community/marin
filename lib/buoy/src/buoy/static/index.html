<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>buoy — wandb run viewer</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
  <style>
    :root { font-family: system-ui, -apple-system, sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; color: #1a1a1a; background: #f7f9fc; }
    .app { display: flex; height: 100vh; }

    /* ---- left sidebar: selectors + run list ---- */
    .sidebar { width: 340px; min-width: 300px; background: #0d3b66; color: #fff; display: flex; flex-direction: column; padding: 1em 1em .6em; }
    .brand-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: .7em; }
    .sidebar .brand { font-size: 1.35em; font-weight: 700; letter-spacing: .5px; }
    #side-toggle { border: 0; background: rgba(255, 255, 255, .15); color: #fff; border-radius: 6px; width: 27px; height: 27px; cursor: pointer; font-size: 15px; line-height: 1; }
    #side-toggle:hover { background: rgba(255, 255, 255, .32); }
    .side-open { display: none; align-self: flex-start; margin: .8em 0 0 1.5em; padding: .45em .9em; border: 1px solid #cbd5e0; border-radius: 7px; background: #fff; color: #0d3b66; cursor: pointer; font-size: 13px; }
    .side-open:hover { background: #eef4fb; }
    .app.collapsed .sidebar { display: none; }
    .app.collapsed .side-open { display: inline-block; }
    .field { display: flex; flex-direction: column; gap: .3em; margin-bottom: .55em; }
    .field > span { font-size: .66rem; text-transform: uppercase; letter-spacing: .07em; color: #aecbe8; }
    .field input, .sidebar .search {
      width: 100%; font-size: 13px; padding: .5em .65em; border: 1px solid #2c5d8a; border-radius: 7px;
      background: #fff; color: #1a1a1a;
    }
    .field input::placeholder, .search::placeholder { color: #9aa7b4; }
    .field input:focus, .search:focus { outline: none; border-color: #f4d35e; box-shadow: 0 0 0 3px rgba(244, 211, 94, .3); }
    .sidebar .search { margin: .5em 0 .5em; }
    #run-count { font-size: .66rem; text-transform: uppercase; letter-spacing: .06em; color: #aecbe8; margin-bottom: .3em; }
    #run-panel { flex: 1; overflow: auto; margin: 0 -.5em; padding: 0 .5em; }
    .run-item { display: flex; gap: .5em; align-items: flex-start; padding: .45em .5em; border-radius: 7px; cursor: pointer; }
    .run-item:hover { background: rgba(255, 255, 255, .09); }
    .run-item.active { background: #f4d35e; }
    .run-item .ic { flex: 0 0 auto; line-height: 1.3; }
    .run-item .rid { font-family: ui-monospace, monospace; font-size: 12px; word-break: break-all; line-height: 1.3; }
    .run-item .sub { font-size: 11px; color: #aecbe8; margin-top: .1em; }
    .run-item.active .rid, .run-item.active .sub { color: #0d3b66; }
    .run-empty { color: #aecbe8; font-size: 12px; padding: .5em; }

    /* ---- main area ---- */
    .main { flex: 1; overflow: auto; display: flex; flex-direction: column; }
    #status { display: flex; align-items: center; gap: .6em; padding: .85em 1.5em; color: #4a5568; font-size: 13px; }
    .spinner { width: 16px; height: 16px; border: 2px solid #d7e0ea; border-top-color: #0d3b66; border-radius: 50%; animation: spin .8s linear infinite; flex: 0 0 auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-row { display: flex; align-items: center; gap: .6em; color: #4a5568; font-size: 13px; }
    .load-run { font-family: ui-monospace, monospace; color: #0d3b66; }
    .load-detail { color: #718096; }
    .tabs { display: flex; gap: .5em; padding: .5em 1.5em 0; border-bottom: 1px solid #e2e8f0; background: #fff; }
    .tab { padding: .6em 1.2em; cursor: pointer; border: 1px solid transparent; border-bottom: 0; color: #4a5568; }
    .tab.active { border-color: #e2e8f0; border-radius: 6px 6px 0 0; background: #f7f9fc; font-weight: 650; color: #0d3b66; }
    .live { margin-left: auto; align-self: center; padding-right: 1em; font-size: 12px; color: #2f855a; font-weight: 600; }
    .pane { padding: 1.25em 1.5em; }
    a { color: #0d3b66; }
    .hidden { display: none; }
    .search { font-size: 13px; padding: .55em .8em; border: 1px solid #cbd5e0; border-radius: 7px; margin-bottom: 1em; }

    #info { display: flex; flex-wrap: wrap; gap: .5em 1.4em; align-items: baseline; margin-bottom: 1.1em; }
    #info .name { font-size: 1.15em; font-weight: 650; color: #0d3b66; word-break: break-all; }
    #info .pill { font-size: .68rem; text-transform: uppercase; letter-spacing: .05em; padding: .2em .65em; border-radius: 999px; background: #edf2f7; color: #2d3748; font-weight: 600; }
    #info .kv { color: #4a5568; font-size: .9em; }
    #info .kv b { color: #1a1a1a; font-weight: 600; }
    .refetch-btn { padding: .3em .7em; border: 1px solid #cbd5e0; border-radius: 6px; background: #fff; color: #0d3b66; font-size: 12px; cursor: pointer; }
    .refetch-btn:hover { background: #eef4fb; }
    #summary-search { display: block; width: min(560px, 100%); }
    .kv-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5em; align-items: start; }
    .kv-col h3 { margin: 0 0 .5em; font-size: .78rem; text-transform: uppercase; letter-spacing: .06em; color: #718096; }
    .kv-col table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
    .kv-col td { padding: .32em .5em; border-bottom: 1px solid #eef2f6; vertical-align: top; word-break: break-word; }
    .kv-col td.k { color: #4a5568; width: 46%; font-family: ui-monospace, monospace; }
    .kv-col td.v { font-family: ui-monospace, monospace; }

    .chart-toolbar { display: flex; align-items: center; gap: 1.2em; flex-wrap: wrap; margin-bottom: 1em; font-size: 12.5px; color: #4a5568; }
    .chart-toolbar label { display: inline-flex; align-items: center; gap: .4em; cursor: pointer; }
    .chart-toolbar .smooth input[type="range"] { width: 130px; }
    .chart-toolbar #smooth-val { font-family: ui-monospace, monospace; width: 2.6em; }
    .seg { display: inline-flex; align-items: center; gap: .3em; }
    .seg button { border: 1px solid #cbd5e0; background: #fff; color: #4a5568; padding: .2em .55em; cursor: pointer; font-size: 12px; border-radius: 5px; }
    .seg button.active { background: #0d3b66; color: #fff; border-color: #0d3b66; }
    .tb-hint { color: #94a3b8; font-size: 11.5px; }
    #charts { display: grid; grid-template-columns: repeat(auto-fill, minmax(440px, 1fr)); gap: .9em; }
    .chart { position: relative; border: 1px solid #e7edf3; border-radius: 8px; background: #fff; box-shadow: 0 1px 3px rgba(0, 0, 0, .05); overflow: hidden; }
    .chart-ctrls { position: absolute; top: 6px; right: 8px; z-index: 3; display: flex; gap: 4px; }
    .chart-ctrls .lg { font-size: 10px; padding: 1px 6px; border: 1px solid #d7e0ea; border-radius: 5px; background: rgba(255, 255, 255, .82); color: #718096; cursor: pointer; }
    .chart-ctrls .lg.active { background: #0d3b66; color: #fff; border-color: #0d3b66; }
    .chips { display: flex; flex-wrap: wrap; gap: .4em; margin-bottom: .6em; }
    .chip { display: inline-flex; align-items: center; gap: .45em; background: #0d3b66; color: #fff; border-radius: 999px; padding: .25em .35em .25em .75em; font-size: 12px; font-family: ui-monospace, monospace; }
    .chip button { border: 0; background: rgba(255, 255, 255, .25); color: #fff; border-radius: 999px; width: 16px; height: 16px; line-height: 14px; text-align: center; cursor: pointer; font-size: 12px; padding: 0; }
    .chip button:hover { background: rgba(255, 255, 255, .5); }
    .combo { position: relative; width: min(560px, 100%); margin-bottom: 1.1em; }
    .combo .search { margin-bottom: 0; width: 100%; }
    .options { position: absolute; z-index: 20; left: 0; right: 0; top: calc(100% + 4px); background: #fff; border: 1px solid #cbd5e0; border-radius: 8px; box-shadow: 0 8px 22px rgba(0, 0, 0, .14); max-height: 300px; overflow: auto; }
    .option { padding: .5em .8em; font-size: 12.5px; font-family: ui-monospace, monospace; cursor: pointer; }
    .option:hover { background: #eef4fb; }
    .option.muted { color: #94a3b8; font-style: italic; cursor: default; }
    #profile-pane iframe { width: 100%; height: 82vh; border: 1px solid #ccc; }
    @media (max-width: 760px) { .kv-cols { grid-template-columns: 1fr; } .sidebar { width: 260px; min-width: 220px; } }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand-row"><span class="brand">buoy</span><button id="side-toggle" title="hide sidebar">«</button></div>
      <label class="field"><span>entity</span><input id="entity" list="entity-list" autocomplete="off"></label>
      <datalist id="entity-list"></datalist>
      <label class="field"><span>project</span><input id="project" list="project-list" autocomplete="off"></label>
      <datalist id="project-list"></datalist>
      <label class="field"><span>user</span><input id="user" list="user-list" placeholder="(any)" autocomplete="off"></label>
      <datalist id="user-list"></datalist>
      <input id="run-search" class="search" placeholder="search runs…" autocomplete="off">
      <div id="run-count"></div>
      <div id="run-panel"></div>
    </aside>

    <main class="main">
      <button id="side-open" class="side-open" title="show runs">☰ runs</button>
      <div id="status">pick an entity / project, then a run from the list</div>
      <div class="tabs hidden" id="tabs">
        <div class="tab active" data-pane="summary-pane">summary</div>
        <div class="tab" data-pane="charts-pane">charts</div>
        <div class="tab" data-pane="profile-pane">profile</div>
        <span id="live" class="live"></span>
      </div>

      <div id="summary-pane" class="pane hidden">
        <div id="info"></div>
        <input id="summary-search" class="search" placeholder="filter summary metrics &amp; config…">
        <div class="kv-cols">
          <div class="kv-col"><h3>summary metrics</h3><table id="summary-table"></table></div>
          <div class="kv-col"><h3>config</h3><table id="config-table"></table></div>
        </div>
      </div>

      <div id="charts-pane" class="pane hidden">
        <div id="metric-chips" class="chips"></div>
        <div class="combo">
          <input id="metric-search" class="search" placeholder="add a metric to plot…" autocomplete="off">
          <div id="metric-options" class="options hidden"></div>
        </div>
        <div class="chart-toolbar">
          <label class="smooth">smoothing<input type="range" id="smooth" min="0" max="0.97" step="0.01" value="0"><span id="smooth-val">0.00</span></label>
          <span class="seg" id="size-seg">size
            <button data-size="s">S</button><button data-size="m">M</button><button data-size="l" class="active">L</button>
          </span>
          <span class="tb-hint">log scale: toggle per chart ↗</span>
        </div>
        <div id="charts"></div>
      </div>

      <div id="profile-pane" class="pane hidden"></div>
    </main>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const DEFAULT_METRICS = [
      "train/cross_entropy_loss", "train/loss", "optim/learning_rate",
      "throughput/hook_time", "throughput/loading_time", "run_progress",
    ];
    const qs = (o) => new URLSearchParams(o).toString();
    let current = null;          // { r, m } for the loaded run
    let loadedRunId = null;      // highlighted run in the sidebar
    let profileStarted = false;  // prepare the profile lazily, on first tab open
    let selectedMetrics = [];    // metrics chosen in the charts tab
    let metricData = {};         // key -> [{step,value}], cached so toolbar toggles don't refetch
    let chartAxis = {};          // per-metric { logY, logX } — log scale is per chart
    const chartOpts = { smoothing: 0, size: "l" };
    const CHART_H = { s: 200, m: 285, l: 420 }, CHART_MINW = { s: 340, m: 440, l: 720 };
    const PALETTE = ["#1f77b4", "#d62728", "#2ca02c", "#9467bd", "#ff7f0e", "#17becf", "#8c564b", "#e377c2", "#7f7f7f", "#bcbd22"];
    let liveTimer = null;        // running-run auto-refresh timer
    let searchTimer = null;
    const LIVE_INTERVAL = 30000;

    const STATE_ICON = { running: "🟢", finished: "🏁", crashed: "💥", failed: "❌", killed: "⛔", preempted: "🟡" };
    const stateIcon = (s) => STATE_ICON[s] || "⚪";

    const jget = (url) => fetch(url).then((r) => r.json()).catch(() => ({}));
    const el = (tag, cls, text) => { const e = document.createElement(tag); if (cls) e.className = cls; if (text != null) e.textContent = text; return e; };
    function fillList(id, values) {
      const dl = $(id);
      dl.innerHTML = "";
      for (const v of values) { const o = document.createElement("option"); o.value = v; dl.appendChild(o); }
    }

    async function loadEntities() { fillList("entity-list", (await jget("api/entities")).entities || []); }
    async function loadProjects() {
      const e = $("entity").value.trim();
      if (!e) return;
      fillList("project-list", (await jget("api/projects?" + qs({ entity: e }))).projects || []);
    }
    // Fuller author list — scans more runs than the picker so contributors with only
    // older runs still appear. Best-effort, in background.
    async function loadUsers() {
      const e = $("entity").value.trim(), p = $("project").value.trim();
      if (!e || !p) return;
      const users = (await jget("api/users?" + qs({ entity: e, project: p }))).users;
      if (users && users.length) fillList("user-list", users);
    }

    // Runs are filtered server-side (user + name search) so any run is findable
    // regardless of recency; results arrive newest-first and render as a clickable list.
    async function fetchRuns({ search = "" } = {}) {
      const e = $("entity").value.trim(), p = $("project").value.trim();
      if (!e || !p) { renderRunPanel([]); return; }
      const user = $("user").value.trim();
      const params = { entity: e, project: p, limit: 100 };
      if (user) params.user = user;
      if (search) params.search = search;
      $("run-count").textContent = "loading…";
      const runs = (await jget("api/runs?" + qs(params))).runs || [];
      if (!user && !search) fillList("user-list", [...new Set(runs.map((r) => r.user).filter(Boolean))].sort());
      renderRunPanel(runs);
    }

    function renderRunPanel(runs) {
      const panel = $("run-panel");
      panel.textContent = "";
      $("run-count").textContent = runs.length ? `${runs.length} runs` : "";
      if (!runs.length) { panel.appendChild(el("div", "run-empty", "no runs")); return; }
      for (const rn of runs) {
        const item = el("div", "run-item");
        item.dataset.id = rn.id;
        if (rn.id === loadedRunId) item.classList.add("active");
        const body = el("div", "run-body");
        body.appendChild(el("div", "rid", rn.id));
        const sub = [rn.user, (rn.created_at || "").replace("T", " ").replace("Z", "")].filter(Boolean).join(" · ");
        if (sub) body.appendChild(el("div", "sub", sub));
        item.append(el("span", "ic", stateIcon(rn.state)), body);
        item.addEventListener("click", () => load(rn.id));
        panel.appendChild(item);
      }
    }

    function highlightRun(runId) {
      document.querySelectorAll(".run-item").forEach((it) => it.classList.toggle("active", it.dataset.id === runId));
    }

    // Spinner + status message; `runId`/`detail` are optional emphasized parts.
    function showLoading(msg, runId, detail) {
      const s = $("status");
      s.textContent = "";
      s.appendChild(el("div", "spinner"));
      s.appendChild(el("span", null, msg));
      if (runId) s.appendChild(el("span", "load-run", runId));
      if (detail) s.appendChild(el("span", "load-detail", "· " + detail));
    }

    async function init() {
      const d = await jget("api/defaults");
      const p = new URLSearchParams(location.search);
      $("entity").value = p.get("entity") || d.entity || "marin-community";
      if (p.get("project")) $("project").value = p.get("project");
      if (p.get("user")) $("user").value = p.get("user");
      loadEntities();
      await loadProjects();
      if ($("project").value) { await fetchRuns(); loadUsers(); }
      if (p.get("run")) load(p.get("run"));
    }

    // ---- load a run ----
    async function load(runId) {
      const entity = $("entity").value.trim(), project = $("project").value.trim();
      if (!project || !runId) return;
      loadedRunId = runId;
      highlightRun(runId);
      const r = { entity, project, run: runId };
      const u = $("user").value.trim();
      history.replaceState(null, "", "?" + qs(u ? { ...r, user: u } : r));  // shareable deep-link
      $("info").textContent = "";
      $("live").textContent = "";
      $("tabs").classList.add("hidden");
      clearTimeout(liveTimer);
      profileStarted = false;
      current = null;
      showLoading("mirroring", runId, "starting…");
      await fetch("api/mirror", {
        method: "POST", headers: { "content-type": "application/json" },
        body: JSON.stringify({ entity, project, run_id: runId }),
      });
      poll(r, "mirroring");
    }

    async function poll(r, verb) {
      const s = await jget("api/mirror_status?" + qs(r));
      if (s.state === "running") { showLoading(verb, r.run, s.detail || "…"); setTimeout(() => poll(r, verb), 1500); return; }
      if (s.state === "error") { $("status").textContent = "mirror failed: " + s.error; return; }
      if (s.state === "absent") { $("status").textContent = "run not found"; return; }
      render(r);
    }

    // Force a re-mirror (refresh=true re-downloads everything incl. the profile
    // artifact), then re-render — for a finished run whose cache predates a fix.
    async function refetch() {
      if (!current) return;
      const r = current.r;
      clearTimeout(liveTimer);
      profileStarted = false;
      showLoading("refetching", r.run, "starting…");
      await fetch("api/mirror", {
        method: "POST", headers: { "content-type": "application/json" },
        body: JSON.stringify({ entity: r.entity, project: r.project, run_id: r.run, refresh: true }),
      });
      const p = async () => {
        if (!stillCurrent(r)) return;
        const s = await jget("api/mirror_status?" + qs(r));
        if (s.state === "running") { showLoading("refetching", r.run, s.detail || "…"); setTimeout(p, 1500); return; }
        if (s.state === "error") { $("status").textContent = "refetch failed: " + s.error; return; }
        render(r);
      };
      p();
    }

    // ---- render helpers (user-controlled text via textContent — no innerHTML) ----
    const fmtVal = (v) =>
      v == null ? "" : typeof v === "object" ? JSON.stringify(v)
        : typeof v === "number" ? (Number.isInteger(v) ? String(v) : String(+v.toFixed(6))) : String(v);
    function flatten(obj, prefix = "", out = {}) {
      for (const [k, v] of Object.entries(obj || {})) {
        const key = prefix ? `${prefix}.${k}` : k;
        if (v && typeof v === "object" && !Array.isArray(v)) flatten(v, key, out);
        else out[key] = v;
      }
      return out;
    }

    function renderInfo(m) {
      const info = $("info");
      info.textContent = "";
      info.appendChild(el("span", "name", m.display_name));
      info.appendChild(el("span", "pill", m.state));
      const add = (label, val) => {
        if (val == null || val === "") return;
        const s = el("span", "kv");
        s.append(label + " ", el("b", null, String(val)));
        info.appendChild(s);
      };
      add("user", m.user);
      add("created", (m.created_at || "").replace("T", " ").replace("Z", ""));
      add("steps", m.history.rows);
      add("metrics", m.history.columns.length);
      if (m.tags && m.tags.length) add("tags", m.tags.join(", "));
      const a = el("a", null, "open in wandb ↗");
      a.target = "_blank"; a.rel = "noopener";
      if (/^https?:\/\//.test(m.url || "")) a.href = m.url;
      info.appendChild(a);
      const btn = el("button", "refetch-btn", "↻ refetch");
      btn.title = "re-pull this run from wandb (metrics, config, summary, profile artifact)";
      btn.addEventListener("click", refetch);
      info.appendChild(btn);
      if (m.notes) { const n = el("div", "kv", "notes: " + m.notes); n.style.flexBasis = "100%"; info.appendChild(n); }
    }

    function fillKV(tableId, obj, q) {
      const t = $(tableId);
      t.textContent = "";
      for (const k of Object.keys(obj || {}).filter((k) => !q || k.toLowerCase().includes(q)).sort()) {
        const tr = document.createElement("tr");
        tr.append(el("td", "k", k), el("td", "v", fmtVal(obj[k])));
        t.appendChild(tr);
      }
    }
    function renderKV() {
      const q = $("summary-search").value.trim().toLowerCase();
      fillKV("summary-table", current.summary, q);
      fillKV("config-table", current.config, q);
    }

    // ---- charts tab: chip multi-select with a searchable dropdown ----
    function renderChips() {
      const box = $("metric-chips");
      box.textContent = "";
      for (const k of selectedMetrics) {
        const chip = el("span", "chip");
        chip.append(document.createTextNode(k));
        const x = el("button", null, "×");
        x.title = "remove";
        x.addEventListener("click", () => removeMetric(k));
        chip.appendChild(x);
        box.appendChild(chip);
      }
    }
    function addMetric(k) {
      if (!selectedMetrics.includes(k)) selectedMetrics.push(k);
      $("metric-search").value = "";
      hideOptions();
      renderChips();
      plotSelected();
    }
    function removeMetric(k) {
      selectedMetrics = selectedMetrics.filter((m) => m !== k);
      renderChips();
      plotSelected();
    }
    const hideOptions = () => $("metric-options").classList.add("hidden");
    function showOptions() {
      const cols = current ? current.m.history.columns : [];
      const q = $("metric-search").value.trim().toLowerCase();
      const matches = cols.filter((c) => !selectedMetrics.includes(c) && (!q || c.toLowerCase().includes(q)));
      const opts = $("metric-options");
      opts.textContent = "";
      if (!q && !matches.length) { hideOptions(); return; }
      if (!matches.length) {
        opts.appendChild(el("div", "option muted", "no metrics match"));
      } else {
        for (const c of matches.slice(0, 50)) {
          const o = el("div", "option", c);
          o.addEventListener("mousedown", (e) => { e.preventDefault(); addMetric(c); });
          opts.appendChild(o);
        }
        if (matches.length > 50) opts.appendChild(el("div", "option muted", `+${matches.length - 50} more — keep typing`));
      }
      opts.classList.remove("hidden");
    }
    async function plotSelected() {
      if (!current) return;
      if (!selectedMetrics.length) { $("charts").textContent = "add metrics above to plot"; return; }
      const need = selectedMetrics.filter((k) => !(k in metricData));
      if (need.length) {
        const data = (await jget("api/metrics?" + qs({ ...current.r, keys: need.join(",") }))).metrics || {};
        for (const k of need) metricData[k] = data[k] || [];
      }
      redrawCharts();
    }
    // Redraw from cached data (toolbar toggles don't refetch).
    function redrawCharts() {
      const charts = $("charts");
      charts.style.gridTemplateColumns = `repeat(auto-fill, minmax(${CHART_MINW[chartOpts.size]}px, 1fr))`;
      charts.textContent = "";
      selectedMetrics.forEach((k, i) => drawChart(k, metricData[k] || [], i));
    }
    // wandb-style debiased EMA smoothing.
    function ema(values, w) {
      if (w <= 0) return values;
      let last = 0, debias = 0;
      return values.map((v) => { last = last * w + (1 - w) * v; debias = debias * w + (1 - w); return last / debias; });
    }

    function setTab(pane) {
      document.querySelectorAll(".tab").forEach((t) => t.classList.toggle("active", t.dataset.pane === pane));
      document.querySelectorAll(".pane").forEach((p) => p.classList.toggle("hidden", p.id !== pane));
      if (pane === "profile-pane" && current && current.m.profile && !profileStarted) {
        profileStarted = true;
        prepareProfile(current.r, $("profile-pane"));
      }
    }

    async function render(r) {
      const m = await jget("api/manifest?" + qs(r));
      current = { r, m };
      $("status").textContent = "";
      renderInfo(m);
      $("tabs").classList.remove("hidden");
      setTab("summary-pane");

      const [cfg, summ] = await Promise.all([jget("api/config?" + qs(r)), jget("api/summary?" + qs(r))]);
      current.config = flatten(cfg.error ? {} : cfg);
      current.summary = flatten(summ.error ? {} : summ);
      renderKV();

      selectedMetrics = DEFAULT_METRICS.filter((k) => m.history.columns.includes(k));
      if (!selectedMetrics.length) selectedMetrics = m.history.columns.slice(0, 6);
      metricData = {};
      chartAxis = {};
      renderChips();
      plotSelected();

      $("profile-pane").textContent = m.profile ? "open the profile tab to load xprof" : "no profile artifact on this run";
      scheduleLive(r);
    }

    // ---- live auto-refresh for running runs ----
    const liveStamp = () => "live · updated " + new Date().toLocaleTimeString();
    function scheduleLive(r) {
      clearTimeout(liveTimer);
      if (!current || current.m.state !== "running") { $("live").textContent = ""; return; }
      $("live").textContent = liveStamp();
      liveTimer = setTimeout(() => refreshLive(r), LIVE_INTERVAL);
    }
    const stillCurrent = (r) =>
      current && current.r.entity === r.entity && current.r.project === r.project && current.r.run === r.run;
    async function refreshLive(r) {
      if (!stillCurrent(r)) return;
      const m = await jget("api/manifest?" + qs(r));
      if (!stillCurrent(r)) return;
      if (!m || m.error || !m.history) { scheduleLive(r); return; }
      current.m = m;
      renderInfo(m);
      const [cfg, summ] = await Promise.all([jget("api/config?" + qs(r)), jget("api/summary?" + qs(r))]);
      if (!stillCurrent(r)) return;
      current.config = flatten(cfg.error ? {} : cfg);
      current.summary = flatten(summ.error ? {} : summ);
      renderKV();
      metricData = {};  // running run grew — re-fetch series
      await plotSelected();
      if (!stillCurrent(r)) return;
      scheduleLive(r);
    }

    function showPaneLoading(pane, msg) {
      pane.textContent = "";
      pane.style.padding = "1.25em 1.5em";
      const row = el("div", "loading-row");
      row.append(el("div", "spinner"), el("span", null, msg));
      pane.appendChild(row);
    }
    async function prepareProfile(r, pane) {
      showPaneLoading(pane, "preparing profile (downloading + launching xprof)…");
      await fetch("api/profile_prepare", {
        method: "POST", headers: { "content-type": "application/json" },
        body: JSON.stringify({ entity: r.entity, project: r.project, run_id: r.run }),
      });
      const poll = async () => {
        const s = await jget("api/profile_status?" + qs(r));
        if (s.state === "ready") {
          pane.textContent = "";
          pane.style.padding = "0";
          const f = document.createElement("iframe");
          f.src = "wrap/" + [r.entity, r.project, r.run].map(encodeURIComponent).join("/");
          pane.appendChild(f);
          return;
        }
        if (s.state === "error") { pane.textContent = "profile failed: " + s.error; return; }
        setTimeout(poll, 2000);
      };
      poll();
    }

    function drawChart(key, points, idx) {
      const ax = chartAxis[key] || (chartAxis[key] = { logY: false, logX: false });
      const card = el("div", "chart");
      const plot = el("div", "chart-plot");
      const ctrls = el("div", "chart-ctrls");
      const mkBtn = (label, axisKey, plotKey) => {
        const b = el("button", "lg" + (ax[axisKey] ? " active" : ""), label);
        b.addEventListener("click", () => {
          ax[axisKey] = !ax[axisKey];
          b.classList.toggle("active", ax[axisKey]);
          Plotly.relayout(plot, { [plotKey]: ax[axisKey] ? "log" : "linear" });  // lightweight, keeps zoom
        });
        return b;
      };
      ctrls.append(mkBtn("log y", "logY", "yaxis.type"), mkBtn("log x", "logX", "xaxis.type"));
      card.append(ctrls, plot);
      $("charts").appendChild(card);

      const x = points.map((p) => p.step), y = points.map((p) => p.value);
      const color = PALETTE[idx % PALETTE.length];
      const traces = [];
      if (chartOpts.smoothing > 0 && y.length > 1) {
        // raw faint underneath, smoothed bold on top (wandb style)
        traces.push({ x, y, mode: "lines", line: { width: 1, color }, opacity: 0.22, hoverinfo: "skip", showlegend: false });
        traces.push({ x, y: ema(y, chartOpts.smoothing), mode: "lines", line: { width: 2, color }, name: key });
      } else {
        traces.push({ x, y, mode: "lines", line: { width: 1.6, color }, name: key });
      }
      const axis = (log) => ({ type: log ? "log" : "linear", showgrid: true, gridcolor: "#eef2f6", zeroline: false });
      Plotly.newPlot(plot, traces, {
        title: { text: key, font: { size: 12.5 }, x: 0.02, xanchor: "left", y: 0.97 },
        height: CHART_H[chartOpts.size], margin: { l: 54, r: 14, t: 28, b: 34 },
        template: "plotly_white", hovermode: "x unified", showlegend: false,
        xaxis: axis(ax.logX), yaxis: axis(ax.logY),
      }, { responsive: true, displaylogo: false, modeBarButtonsToRemove: ["lasso2d", "select2d"] });
    }

    // ---- events ----
    const app = document.querySelector(".app");
    const toggleSidebar = (collapsed) => {
      app.classList.toggle("collapsed", collapsed);
      window.dispatchEvent(new Event("resize"));  // let Plotly reflow to the new width
    };
    $("side-toggle").addEventListener("click", () => toggleSidebar(true));
    $("side-open").addEventListener("click", () => toggleSidebar(false));
    document.querySelectorAll(".tab").forEach((t) => t.addEventListener("click", () => setTab(t.dataset.pane)));
    $("entity").addEventListener("change", () => { loadProjects(); fetchRuns(); loadUsers(); });
    $("project").addEventListener("change", () => { fetchRuns(); loadUsers(); });
    $("user").addEventListener("change", () => fetchRuns());
    $("run-search").addEventListener("input", () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => fetchRuns({ search: $("run-search").value.trim() }), 350);
    });
    $("run-search").addEventListener("keydown", (e) => {
      // paste a full run id + Enter loads it directly, even if not in the list
      if (e.key === "Enter" && $("run-search").value.trim()) load($("run-search").value.trim());
    });
    $("summary-search").addEventListener("input", () => { if (current) renderKV(); });
    $("metric-search").addEventListener("input", showOptions);
    $("metric-search").addEventListener("focus", showOptions);
    $("metric-search").addEventListener("keydown", (e) => {
      if (e.key === "Escape") { hideOptions(); return; }
      if (e.key === "Enter") {
        const cols = current ? current.m.history.columns : [];
        const q = $("metric-search").value.trim().toLowerCase();
        const first = cols.find((c) => !selectedMetrics.includes(c) && (!q || c.toLowerCase().includes(q)));
        if (first) addMetric(first);
      }
    });
    document.addEventListener("mousedown", (e) => { if (!e.target.closest(".combo")) hideOptions(); });

    // chart toolbar: smoothing + size redraw from cache (no refetch); log scale is per chart
    $("smooth").addEventListener("input", (e) => {
      chartOpts.smoothing = parseFloat(e.target.value);
      $("smooth-val").textContent = chartOpts.smoothing.toFixed(2);
      redrawCharts();
    });
    $("size-seg").addEventListener("click", (e) => {
      const b = e.target.closest("button[data-size]");
      if (!b) return;
      chartOpts.size = b.dataset.size;
      document.querySelectorAll("#size-seg button").forEach((x) => x.classList.toggle("active", x === b));
      redrawCharts();
    });
    init();
  </script>
</body>
</html>
