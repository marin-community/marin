<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>buoy — wandb run viewer</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
  <style>
    :root { font-family: system-ui, -apple-system, sans-serif; }
    body { margin: 0; color: #1a1a1a; background: #f7f9fc; }
    header {
      padding: 1em 1.5em; background: #0d3b66; color: #fff; display: flex; gap: 1.25em;
      align-items: flex-end; flex-wrap: wrap; box-shadow: 0 2px 8px rgba(0, 0, 0, .18);
    }
    header h1 { font-size: 1.2em; margin: 0 .6em 0 0; align-self: center; font-weight: 650; letter-spacing: .4px; }
    .field { display: flex; flex-direction: column; gap: .35em; }
    .field > span { font-size: .68rem; text-transform: uppercase; letter-spacing: .07em; color: #aecbe8; }
    .field input {
      font-size: 13px; padding: .55em .7em; border: 1px solid #2c5d8a; border-radius: 7px;
      background: #fff; color: #1a1a1a; transition: box-shadow .12s, border-color .12s;
    }
    .field input::placeholder { color: #9aa7b4; }
    .field input:focus { outline: none; border-color: #f4d35e; box-shadow: 0 0 0 3px rgba(244, 211, 94, .35); }
    #entity { width: 150px; } #project { width: 140px; } #user { width: 120px; } #run { width: 440px; max-width: 60vw; }
    header button {
      padding: .6em 1.3em; border: 0; border-radius: 7px; background: #f4d35e; color: #0d3b66;
      font-weight: 650; font-size: 13px; cursor: pointer; transition: background .12s;
    }
    header button:hover { background: #f8e08a; }
    #status { padding: .7em 1.5em; color: #555; }
    #meta { padding: .3em 1.5em .6em; color: #333; }
    .tabs { display: flex; gap: .5em; padding: .4em 1.5em 0; border-bottom: 1px solid #e2e8f0; background: #fff; }
    .tab { padding: .6em 1.2em; cursor: pointer; border: 1px solid transparent; border-bottom: 0; color: #4a5568; }
    .tab.active { border-color: #e2e8f0; border-radius: 6px 6px 0 0; background: #f7f9fc; font-weight: 650; color: #0d3b66; }
    .live { margin-left: auto; align-self: center; padding-right: 1em; font-size: 12px; color: #2f855a; font-weight: 600; }
    #charts { display: grid; grid-template-columns: repeat(auto-fill, minmax(440px, 1fr)); gap: .9em; }
    .chart { border: 1px solid #e7edf3; border-radius: 8px; background: #fff; box-shadow: 0 1px 3px rgba(0, 0, 0, .05); }
    #profile-pane iframe { width: 100%; height: 82vh; border: 1px solid #ccc; }
    .hidden { display: none; }
    a { color: #0d3b66; }
    .pane { padding: 1.25em 1.5em; }
    .search {
      width: min(560px, 92vw); padding: .55em .8em; font-size: 13px; border: 1px solid #cbd5e0;
      border-radius: 7px; margin-bottom: 1em; display: block;
    }
    .search:focus { outline: none; border-color: #0d3b66; box-shadow: 0 0 0 3px rgba(13, 59, 102, .15); }
    #info { display: flex; flex-wrap: wrap; gap: .5em 1.4em; align-items: baseline; margin-bottom: 1.1em; }
    #info .name { font-size: 1.15em; font-weight: 650; color: #0d3b66; word-break: break-all; }
    #info .pill {
      font-size: .68rem; text-transform: uppercase; letter-spacing: .05em; padding: .2em .65em;
      border-radius: 999px; background: #edf2f7; color: #2d3748; font-weight: 600;
    }
    #info .kv { color: #4a5568; font-size: .9em; }
    #info .kv b { color: #1a1a1a; font-weight: 600; }
    .kv-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5em; align-items: start; }
    .kv-col h3 { margin: 0 0 .5em; font-size: .78rem; text-transform: uppercase; letter-spacing: .06em; color: #718096; }
    .kv-col table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
    .kv-col td { padding: .32em .5em; border-bottom: 1px solid #eef2f6; vertical-align: top; word-break: break-word; }
    .kv-col td.k { color: #4a5568; width: 46%; font-family: ui-monospace, monospace; }
    .kv-col td.v { font-family: ui-monospace, monospace; }
    .chips { display: flex; flex-wrap: wrap; gap: .4em; margin-bottom: .6em; }
    .chip {
      display: inline-flex; align-items: center; gap: .45em; background: #0d3b66; color: #fff;
      border-radius: 999px; padding: .25em .35em .25em .75em; font-size: 12px; font-family: ui-monospace, monospace;
    }
    .chip button {
      border: 0; background: rgba(255, 255, 255, .25); color: #fff; border-radius: 999px; width: 16px; height: 16px;
      line-height: 14px; text-align: center; cursor: pointer; font-size: 12px; padding: 0;
    }
    .chip button:hover { background: rgba(255, 255, 255, .5); }
    .combo { position: relative; width: min(560px, 92vw); margin-bottom: 1.1em; }
    .combo .search { margin-bottom: 0; width: 100%; box-sizing: border-box; }
    .options {
      position: absolute; z-index: 20; left: 0; right: 0; top: calc(100% + 4px); background: #fff;
      border: 1px solid #cbd5e0; border-radius: 8px; box-shadow: 0 8px 22px rgba(0, 0, 0, .14);
      max-height: 300px; overflow: auto;
    }
    .option { padding: .5em .8em; font-size: 12.5px; font-family: ui-monospace, monospace; cursor: pointer; }
    .option:hover { background: #eef4fb; }
    .option.muted { color: #94a3b8; font-style: italic; cursor: default; }
    @media (max-width: 760px) { .kv-cols { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <h1>buoy</h1>
    <label class="field"><span>entity</span><input id="entity" list="entity-list" autocomplete="off"></label>
    <datalist id="entity-list"></datalist>
    <label class="field"><span>project</span><input id="project" list="project-list" autocomplete="off"></label>
    <datalist id="project-list"></datalist>
    <label class="field"><span>user</span><input id="user" list="user-list" placeholder="(any)" autocomplete="off"></label>
    <datalist id="user-list"></datalist>
    <label class="field"><span>run</span><input id="run" list="run-list" placeholder="type to filter…" autocomplete="off"></label>
    <datalist id="run-list"></datalist>
    <button id="load">load</button>
  </header>
  <div id="status"></div>
  <div class="tabs hidden" id="tabs">
    <div class="tab active" data-pane="summary-pane">summary</div>
    <div class="tab" data-pane="charts-pane">charts</div>
    <div class="tab" data-pane="profile-pane">profile</div>
    <span id="live" class="live"></span>
  </div>

  <div id="summary-pane" class="pane">
    <div id="info"></div>
    <input id="summary-search" class="search" placeholder="filter summary metrics &amp; config…">
    <div class="kv-cols">
      <div class="kv-col"><h3>summary metrics</h3><table id="summary-table"></table></div>
      <div class="kv-col"><h3>config</h3><table id="config-table"></table></div>
    </div>
  </div>

  <div id="charts-pane" class="pane hidden">
    <div id="metric-chips" class="chips"></div>
    <div class="combo">
      <input id="metric-search" class="search" placeholder="add a metric to plot…" autocomplete="off">
      <div id="metric-options" class="options hidden"></div>
    </div>
    <div id="charts"></div>
  </div>

  <div id="profile-pane" class="pane hidden"></div>

  <script>
    const $ = (id) => document.getElementById(id);
    const DEFAULT_METRICS = [
      "train/cross_entropy_loss", "train/loss", "optim/learning_rate",
      "throughput/hook_time", "throughput/loading_time", "run_progress",
    ];
    const qs = (o) => new URLSearchParams(o).toString();
    let current = null;          // { r, m } for the loaded run
    let profileStarted = false;  // prepare the profile lazily, on first tab open
    let selectedMetrics = [];    // metrics chosen in the charts tab
    let liveTimer = null;        // running-run auto-refresh timer
    const LIVE_INTERVAL = 30000;

    // wandb run state -> status glyph, shown as a prefix in the run datalist.
    const STATE_ICON = {
      running: "🟢", finished: "🏁", crashed: "💥", failed: "❌", killed: "⛔", preempted: "🟡",
    };
    const ICONS = Object.values(STATE_ICON).concat("⚪");
    const stateIcon = (s) => STATE_ICON[s] || "⚪";
    // Strip a leading status glyph so the bare run id reaches the API (run ids have
    // no spaces, so this only removes the icon we prepended).
    function cleanRunId(v) {
      v = (v || "").trim();
      for (const ic of ICONS) if (v.startsWith(ic + " ")) return v.slice(ic.length + 1).trim();
      return v;
    }

    const jget = (url) => fetch(url).then((r) => r.json()).catch(() => ({}));
    function fillList(id, values) {
      const dl = $(id);
      dl.innerHTML = "";
      for (const v of values) {
        const o = document.createElement("option");
        o.value = v;
        dl.appendChild(o);
      }
    }

    async function loadEntities() { fillList("entity-list", (await jget("api/entities")).entities || []); }

    async function loadProjects() {
      const e = $("entity").value.trim();
      if (!e) return;
      fillList("project-list", []);
      fillList("project-list", (await jget("api/projects?" + qs({ entity: e }))).projects || []);
    }

    let searchTimer;

    // Runs are filtered server-side (user + name search) so any run is findable
    // regardless of recency; results arrive newest-first.
    async function fetchRuns({ search = "" } = {}) {
      const e = $("entity").value.trim(), p = $("project").value.trim();
      if (!e || !p) return;
      const user = $("user").value.trim();
      const params = { entity: e, project: p, limit: 50 };
      if (user) params.user = user;
      if (search) params.search = search;
      const runs = (await jget("api/runs?" + qs(params))).runs || [];
      // Seed the user suggestions from an unfiltered listing only.
      if (!user && !search) fillList("user-list", [...new Set(runs.map((r) => r.user).filter(Boolean))].sort());
      fillList("run-list", runs.map((r) => `${stateIcon(r.state)} ${r.id}`));
    }

    async function init() {
      const d = await jget("api/defaults");
      const p = new URLSearchParams(location.search);
      $("entity").value = p.get("entity") || d.entity || "marin-community";
      if (p.get("project")) $("project").value = p.get("project");
      if (p.get("user")) $("user").value = p.get("user");
      loadEntities();
      await loadProjects();
      if ($("project").value) await fetchRuns();
      if (p.get("run")) { $("run").value = p.get("run"); load(); }
    }

    function refs() {
      return { entity: $("entity").value.trim(), project: $("project").value.trim(), run: cleanRunId($("run").value) };
    }

    function setTab(pane) {
      document.querySelectorAll(".tab").forEach((t) => t.classList.toggle("active", t.dataset.pane === pane));
      document.querySelectorAll(".pane").forEach((p) => p.classList.toggle("hidden", p.id !== pane));
      if (pane === "profile-pane" && current && current.m.profile && !profileStarted) {
        profileStarted = true;
        prepareProfile(current.r, $("profile-pane"));
      }
    }
    document.querySelectorAll(".tab").forEach((t) => t.addEventListener("click", () => setTab(t.dataset.pane)));

    async function load() {
      const r = refs();
      if (!r.project || !r.run) { $("status").textContent = "enter a project and run id"; return; }
      // Keep the SPA URL a shareable deep-link (the wrap frame stops xprof from clobbering it).
      const u = $("user").value.trim();
      history.replaceState(null, "", "?" + qs(u ? { ...r, user: u } : r));
      $("charts").innerHTML = "";
      $("info").textContent = "";
      $("live").textContent = "";
      $("tabs").classList.add("hidden");
      clearTimeout(liveTimer);
      profileStarted = false;
      current = null;
      $("status").textContent = "mirroring " + r.run + " … (first load of a large run can take ~1 min)";

      await fetch("api/mirror", {
        method: "POST", headers: { "content-type": "application/json" },
        body: JSON.stringify({ entity: r.entity, project: r.project, run_id: r.run }),
      });
      poll(r);
    }

    async function poll(r) {
      const s = await fetch("api/mirror_status?" + qs(r)).then((x) => x.json());
      if (s.state === "running") { setTimeout(() => poll(r), 2000); return; }
      if (s.state === "error") { $("status").textContent = "mirror failed: " + s.error; return; }
      if (s.state === "absent") { $("status").textContent = "run not found"; return; }
      render(r);
    }

    // ---- helpers (all user-controlled text via textContent — no innerHTML) ----
    const el = (tag, cls, text) => { const e = document.createElement(tag); if (cls) e.className = cls; if (text != null) e.textContent = text; return e; };
    const fmtVal = (v) =>
      v == null ? "" : typeof v === "object" ? JSON.stringify(v)
        : typeof v === "number" ? (Number.isInteger(v) ? String(v) : String(+v.toFixed(6))) : String(v);
    function flatten(obj, prefix = "", out = {}) {
      for (const [k, v] of Object.entries(obj || {})) {
        const key = prefix ? `${prefix}.${k}` : k;
        if (v && typeof v === "object" && !Array.isArray(v)) flatten(v, key, out);
        else out[key] = v;
      }
      return out;
    }

    function renderInfo(m) {
      const info = $("info");
      info.textContent = "";
      info.appendChild(el("span", "name", m.display_name));
      info.appendChild(el("span", "pill", m.state));
      const add = (label, val) => {
        if (val == null || val === "") return;
        const s = el("span", "kv");
        s.append(label + " ", el("b", null, String(val)));
        info.appendChild(s);
      };
      add("user", m.user);
      add("created", (m.created_at || "").replace("T", " ").replace("Z", ""));
      add("steps", m.history.rows);
      add("metrics", m.history.columns.length);
      if (m.tags && m.tags.length) add("tags", m.tags.join(", "));
      const a = el("a", null, "open in wandb ↗");
      a.target = "_blank"; a.rel = "noopener";
      if (/^https?:\/\//.test(m.url || "")) a.href = m.url;
      info.appendChild(a);
      if (m.notes) { const n = el("div", "kv", "notes: " + m.notes); n.style.flexBasis = "100%"; info.appendChild(n); }
    }

    function fillKV(tableId, obj, q) {
      const t = $(tableId);
      t.textContent = "";
      for (const k of Object.keys(obj || {}).filter((k) => !q || k.toLowerCase().includes(q)).sort()) {
        const tr = document.createElement("tr");
        tr.append(el("td", "k", k), el("td", "v", fmtVal(obj[k])));
        t.appendChild(tr);
      }
    }
    function renderKV() {
      const q = $("summary-search").value.trim().toLowerCase();
      fillKV("summary-table", current.summary, q);
      fillKV("config-table", current.config, q);
    }

    // ---- charts tab: chip multi-select with a searchable dropdown ----
    function renderChips() {
      const box = $("metric-chips");
      box.textContent = "";
      for (const k of selectedMetrics) {
        const chip = el("span", "chip");
        chip.append(document.createTextNode(k));
        const x = el("button", null, "×");
        x.title = "remove";
        x.addEventListener("click", () => removeMetric(k));
        chip.appendChild(x);
        box.appendChild(chip);
      }
    }
    function addMetric(k) {
      if (!selectedMetrics.includes(k)) selectedMetrics.push(k);
      $("metric-search").value = "";
      hideOptions();
      renderChips();
      plotSelected();
    }
    function removeMetric(k) {
      selectedMetrics = selectedMetrics.filter((m) => m !== k);
      renderChips();
      plotSelected();
    }
    const hideOptions = () => $("metric-options").classList.add("hidden");
    function showOptions() {
      const cols = current ? current.m.history.columns : [];
      const q = $("metric-search").value.trim().toLowerCase();
      const matches = cols.filter((c) => !selectedMetrics.includes(c) && (!q || c.toLowerCase().includes(q)));
      const opts = $("metric-options");
      opts.textContent = "";
      if (!q && !matches.length) { hideOptions(); return; }
      if (!matches.length) {
        opts.appendChild(el("div", "option muted", "no metrics match"));
      } else {
        for (const c of matches.slice(0, 50)) {
          const o = el("div", "option", c);
          // mousedown (not click) so it fires before the input blur
          o.addEventListener("mousedown", (e) => { e.preventDefault(); addMetric(c); });
          opts.appendChild(o);
        }
        if (matches.length > 50) opts.appendChild(el("div", "option muted", `+${matches.length - 50} more — keep typing`));
      }
      opts.classList.remove("hidden");
    }
    async function plotSelected() {
      const charts = $("charts");
      charts.textContent = "";
      if (!selectedMetrics.length) { charts.textContent = "select metrics above to plot"; return; }
      const data = (await jget("api/metrics?" + qs({ ...current.r, keys: selectedMetrics.join(",") }))).metrics || {};
      for (const key of selectedMetrics) drawChart(key, data[key] || []);
    }

    async function render(r) {
      const m = await jget("api/manifest?" + qs(r));
      current = { r, m };
      $("status").textContent = "";
      renderInfo(m);
      $("tabs").classList.remove("hidden");
      setTab("summary-pane");

      const [cfg, summ] = await Promise.all([jget("api/config?" + qs(r)), jget("api/summary?" + qs(r))]);
      current.config = flatten(cfg.error ? {} : cfg);
      current.summary = flatten(summ.error ? {} : summ);
      renderKV();

      selectedMetrics = DEFAULT_METRICS.filter((k) => m.history.columns.includes(k));
      if (!selectedMetrics.length) selectedMetrics = m.history.columns.slice(0, 6);
      renderChips();
      plotSelected();

      $("profile-pane").textContent = m.profile ? "open the profile tab to load xprof" : "no jax_profile artifact on this run";
      scheduleLive(r);
    }

    // While the run is still running, poll for fresh data and redraw (the server
    // keeps re-mirroring the cache until the run finishes; the poll also keeps that
    // watcher alive). Selected chips and the active tab are preserved.
    const liveStamp = () => "live · updated " + new Date().toLocaleTimeString();
    function scheduleLive(r) {
      clearTimeout(liveTimer);
      if (!current || current.m.state !== "running") { $("live").textContent = ""; return; }
      $("live").textContent = liveStamp();
      liveTimer = setTimeout(() => refreshLive(r), LIVE_INTERVAL);
    }
    const stillCurrent = (r) =>
      current && current.r.entity === r.entity && current.r.project === r.project && current.r.run === r.run;
    async function refreshLive(r) {
      if (!stillCurrent(r)) return;  // user navigated to another run
      const m = await jget("api/manifest?" + qs(r));
      if (!stillCurrent(r)) return;
      if (!m || m.error || !m.history) { scheduleLive(r); return; }  // transient failure — keep polling
      current.m = m;
      renderInfo(m);
      const [cfg, summ] = await Promise.all([jget("api/config?" + qs(r)), jget("api/summary?" + qs(r))]);
      if (!stillCurrent(r)) return;
      current.config = flatten(cfg.error ? {} : cfg);
      current.summary = flatten(summ.error ? {} : summ);
      renderKV();
      await plotSelected();
      if (!stillCurrent(r)) return;
      scheduleLive(r);
    }

    async function prepareProfile(r, pane) {
      pane.textContent = "preparing profile (downloading + launching xprof)…";
      await fetch("api/profile_prepare", {
        method: "POST", headers: { "content-type": "application/json" },
        body: JSON.stringify({ entity: r.entity, project: r.project, run_id: r.run }),
      });
      const poll = async () => {
        const s = await fetch("api/profile_status?" + qs(r)).then((x) => x.json());
        if (s.state === "ready") {
          pane.textContent = "";
          pane.style.padding = "0";
          const f = document.createElement("iframe");
          f.src = "wrap/" + [r.entity, r.project, r.run].map(encodeURIComponent).join("/");
          pane.appendChild(f);
          return;
        }
        if (s.state === "error") { pane.textContent = "profile failed: " + s.error; return; }
        setTimeout(poll, 2000);
      };
      poll();
    }

    function drawChart(key, points) {
      const div = document.createElement("div");
      div.className = "chart";
      $("charts").appendChild(div);
      Plotly.newPlot(div, [{
        x: points.map((p) => p.step), y: points.map((p) => p.value),
        mode: "lines", line: { width: 1.5 }, name: key,
      }], {
        title: { text: key, font: { size: 13 } }, height: 280,
        margin: { l: 48, r: 16, t: 34, b: 32 }, template: "plotly_white",
      }, { displayModeBar: false, responsive: true });
    }

    $("entity").addEventListener("change", () => { loadProjects(); fetchRuns(); });
    $("project").addEventListener("change", fetchRuns);
    $("user").addEventListener("change", () => fetchRuns());
    // Search server-side as the run name is typed (debounced); selecting an option loads it.
    $("run").addEventListener("input", () => {
      clearTimeout(searchTimer);
      const txt = cleanRunId($("run").value);
      searchTimer = setTimeout(() => fetchRuns({ search: txt }), 350);
    });
    $("run").addEventListener("change", () => {
      const id = cleanRunId($("run").value);  // drop the status glyph once a run is picked
      if (id) { $("run").value = id; load(); }
    });
    $("load").addEventListener("click", load);
    $("run").addEventListener("keydown", (e) => { if (e.key === "Enter") load(); });

    // summary tab: filter both tables; charts tab: filter the metric list + toggle plots
    $("summary-search").addEventListener("input", () => { if (current) renderKV(); });
    $("metric-search").addEventListener("input", showOptions);
    $("metric-search").addEventListener("focus", showOptions);
    $("metric-search").addEventListener("keydown", (e) => {
      if (e.key === "Escape") { hideOptions(); return; }
      if (e.key === "Enter") {
        const cols = current ? current.m.history.columns : [];
        const q = $("metric-search").value.trim().toLowerCase();
        const first = cols.find((c) => !selectedMetrics.includes(c) && (!q || c.toLowerCase().includes(q)));
        if (first) addMetric(first);
      }
    });
    document.addEventListener("mousedown", (e) => { if (!e.target.closest(".combo")) hideOptions(); });
    init();
  </script>
</body>
</html>
