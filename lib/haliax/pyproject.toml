# Tool configuration for haliax source files under lib/haliax/
# (Source code lives at src/haliax/; this file only holds formatting configs)

[tool.ruff.lint]
ignore = [ "E203", "E501", "W605", "F821", "E266", "F722", "E731", "E741" ]

[tool.black]
line-length = 119
target-version = ["py311"]
preview = true
