# Tool configuration for levanter source files under lib/levanter/
# (Source code lives at src/levanter/; this file only holds formatting/lint configs)

[tool.ruff]
line-length = 119
target-version = "py311"
extend-exclude = ["scripts/"]

[tool.ruff.lint]
ignore = [
  "E203", "E501", "W605", "F821", "E266", "F722", "E731", "E741"
]

[tool.black]
line-length = 119
target-version = ["py311"]
