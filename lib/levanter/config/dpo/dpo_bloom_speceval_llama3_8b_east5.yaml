# DPO config for train_dpo.py using Bloom SpecEval preference dataset
# (GPT-4.1 chosen vs Mixtral opposite-mode rejected).
# python infra/launch.py --zone us-east5-a --tpu_name debug --tpu_type v5p-8 -- python src/levanter/main/train_dpo.py --config_path config/dpo/dpo_bloom_speceval_llama3_8b_east5.yaml
data:
  tokenizer: marin-community/marin-tokenizer
  shuffle: true
  permutation_type: feistel
  components:
    bloom_speceval_train:
      source:
        type: url
        train_urls:
          - gs://marin-us-east5/preference/bloom_openai_model_spec_gpt41_vs_mixtral_opposite/train/*.jsonl.gz
      format:
        type: preference_chat
        slice_strategy: raise
      cache_dir: gs://marin-us-east5/tokenized/bloom_speceval_train_prefs_marin_tokenizer-4cf2ba
    bloom_speceval_eval:
      source:
        type: url
        validation_urls:
          - gs://marin-us-east5/preference/bloom_openai_model_spec_gpt41_vs_mixtral_opposite/eval/*.jsonl.gz
      format:
        type: preference_chat
        slice_strategy: raise
      cache_dir: gs://marin-us-east5/tokenized/bloom_speceval_eval_prefs_marin_tokenizer-03c31c
  train_weights:
    bloom_speceval_train: 1.0
    bloom_speceval_eval: 0.0

model:
  type: llama
  max_seq_len: 4096
  hidden_dim: 4096
  intermediate_dim: 14336
  num_layers: 32
  num_heads: 32
  num_kv_heads: 8
  flash_attention_block_size: 512
  use_bias: false
  use_layer_norm_weight: true
  initializer_range: 0.02
  rope:
    type: "llama3"

train_seq_len: 4096

trainer:
  seed: 0
  per_device_parallelism: -1
  per_device_eval_parallelism: -1
  tracker:
    type: wandb
    project: "dpo"
    tags: ["dpo", "bloom", "speceval", "llama3"]
  mp: p=f32,c=bfloat16
  train_batch_size: 128
  num_train_steps: 2150
  steps_per_eval: 200
  model_averaging: null
  checkpointer:
    save_interval: 10m
    base_path: gs://marin-us-east5/checkpoints/dpo/bloom_speceval_llama3_8b

optimizer:
  learning_rate: 5e-7
  weight_decay: 0.0
  min_lr_ratio: 0.0
  lr_schedule: "cosine"
  warmup: 0.1
  max_grad_norm: 1.0

adapter:
  type: none

reference:
  type: separate
  model_path: gs://marin-us-east5/gcsfuse_mount/models/meta-llama--Llama-3-1-8B--main
  is_hf: true
beta: 0.01
validation_split_fraction: null

initialize_from_hf: gs://marin-us-east5/gcsfuse_mount/models/meta-llama--Llama-3-1-8B--main
use_hf_model_config: false

hf_save_steps: 200
hf_save_path: gs://marin-us-east5/checkpoints/dpo/bloom_speceval_llama3_8b/hf
