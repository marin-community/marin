name: Iris - Tests
on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - lib/iris/**
      - .github/workflows/iris-unit-tests.yaml

permissions:
  contents: read
  packages: write  # ghcr.io push during cloud image build

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  cpu-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "lib/iris/pyproject.toml"

      - name: Test iris
        env:
          PYTHONASYNCIODEBUG: "1"
        run: |
          cd lib/iris && uv run --group dev python -m pytest -n4 --durations=5 --tb=short -m 'not slow and not docker' tests/

  e2e-smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "lib/iris/pyproject.toml"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('lib/iris/pyproject.toml') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: cd lib/iris && uv run playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: cd lib/iris && uv run playwright install-deps chromium

      - name: Run E2E smoke tests
        env:
          IRIS_SCREENSHOT_DIR: ${{ github.workspace }}/iris-screenshots
          PYTHONASYNCIODEBUG: "1"
        run: |
          mkdir -p ${{ github.workspace }}/iris-screenshots
          cd lib/iris && uv run --group dev python -m pytest \
            tests/e2e/test_smoke.py \
            -m e2e -o "addopts=" --tb=short -v

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iris-smoke-screenshots
          path: iris-screenshots/
          retention-days: 14
          if-no-files-found: ignore

  cloud-smoke-test:
    needs: [cpu-test, e2e-smoke-test]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    concurrency:
      group: iris-cloud-smoke
      cancel-in-progress: false  # never kill a running cloud test — would leak GCP resources
    env:
      LABEL_PREFIX: smoke-${{ github.run_id }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "lib/iris/pyproject.toml"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('lib/iris/pyproject.toml') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: cd lib/iris && uv run playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: cd lib/iris && uv run playwright install-deps chromium

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.IRIS_CI_GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.MARIN_SSH_KEY }}" > ~/.ssh/marin_ray_cluster.pem
          chmod 600 ~/.ssh/marin_ray_cluster.pem

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run cloud smoke tests
        env:
          IRIS_SCREENSHOT_DIR: ${{ github.workspace }}/iris-cloud-screenshots
          PYTHONASYNCIODEBUG: "1"
        run: |
          mkdir -p ${{ github.workspace }}/iris-cloud-screenshots
          cd lib/iris && uv run --group dev python -m pytest \
            tests/e2e/test_smoke.py \
            -m e2e \
            --iris-config examples/smoke.yaml \
            --iris-mode full \
            --iris-label-prefix "$LABEL_PREFIX" \
            -o "addopts=" \
            --tb=short -v \
            --timeout=1200

      - name: Tear down cluster (iris stop)
        if: always()
        run: |
          cd lib/iris && uv run --group dev iris -v \
            --config=examples/smoke.yaml \
            cluster stop --label "$LABEL_PREFIX" || true

      - name: Failsafe GCP resource cleanup
        if: always()
        run: |
          MANAGED_LABEL="iris-${LABEL_PREFIX}-managed"
          PROJECT="${{ secrets.GCP_PROJECT_ID }}"

          echo "Cleaning up GCE instances with label ${MANAGED_LABEL}=true..."
          gcloud compute instances list \
            --project="$PROJECT" \
            --filter="labels.${MANAGED_LABEL}=true" \
            --format="csv[no-heading](name,zone)" 2>/dev/null \
          | while IFS=, read -r name zone; do
              [ -z "$name" ] && continue
              echo "Deleting instance $name ($zone)"
              gcloud compute instances delete "$name" \
                --project="$PROJECT" --zone="$zone" --quiet || true
            done

          echo "Cleaning up TPU VMs with label ${MANAGED_LABEL}=true..."
          for zone in europe-west4-b us-west4-a; do
            gcloud compute tpus tpu-vm list \
              --project="$PROJECT" --zone="$zone" \
              --filter="labels.${MANAGED_LABEL}=true" \
              --format="csv[no-heading](name)" 2>/dev/null \
            | while read -r name; do
                [ -z "$name" ] && continue
                echo "Deleting TPU $name ($zone)"
                gcloud compute tpus tpu-vm delete "$name" \
                  --project="$PROJECT" --zone="$zone" --quiet || true
              done
          done

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iris-cloud-smoke-screenshots
          path: iris-cloud-screenshots/
          retention-days: 14
          if-no-files-found: ignore
