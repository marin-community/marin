name: "Dupekit - Unit"
on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      should_run: ${{ steps.filter.outputs.relevant }}
      check_user_mode: ${{ steps.filter.outputs.user_mode }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4
        id: filter
        with:
          filters: |
            relevant:
              # dupekit is a standalone uv project, NOT a root workspace member
              # (see [tool.uv.workspace] in the root pyproject.toml). Its tests
              # run `uv run --frozen` against lib/dupekit/uv.lock — already
              # covered by lib/dupekit/** below — so the root uv.lock does not
              # affect this suite and must not gate it. The other unit workflows
              # (iris/zephyr/marin/...) DO resolve against the root lock, which
              # is why they keep 'uv.lock' here and dupekit does not.
              - 'lib/dupekit/**'
              - '.github/workflows/dupekit-unit.yaml'
            # The dev-mode guard below inspects the pyprojects where a leaked
            # rust path source (written by scripts/rust_mode.py dev) lands —
            # it never rewrites uv.lock. Gate the guard on those files directly
            # so it runs whenever its targets change, without dragging the
            # expensive test/cargo jobs onto every root-pyproject edit.
            user_mode:
              - 'pyproject.toml'
              - 'lib/finelog/pyproject.toml'

  check-user-mode:
    needs: changes
    if: needs.changes.outputs.should_run == 'true' || needs.changes.outputs.check_user_mode == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Ensure pyprojects are in user mode
        run: |
          # The RUST-DEV SOURCES blocks govern the native packages (dupekit and
          # the finelog pair); any path source committed means dev mode leaked.
          if grep -qE 'marin-(dupekit|finelog|finelog-server) = \{ path' pyproject.toml lib/finelog/pyproject.toml; then
            echo "ERROR: a pyproject.toml has a dev-mode rust source. Run 'python scripts/rust_mode.py user' before committing."
            exit 1
          fi

  unit-test:
    needs: [changes, check-user-mode]
    if: needs.changes.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "lib/dupekit/uv.lock"

      - name: Test dupekit
        run: |
          cd lib/dupekit && uv run --frozen --group test pytest tests/ -v

  rust-checks:
    needs: changes
    if: needs.changes.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: clippy, rustfmt
      - name: cargo fmt
        run: cargo fmt --manifest-path lib/dupekit/rust/Cargo.toml -- --check
      - name: cargo clippy
        run: cargo clippy --manifest-path lib/dupekit/rust/Cargo.toml -- -D warnings
      - name: cargo test
        run: cargo test --manifest-path lib/dupekit/rust/Cargo.toml
