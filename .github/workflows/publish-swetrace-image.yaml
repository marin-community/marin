name: Publish SWE Trace Image

on:
  push:
    branches:
      - will/re-cwm
    paths:
      - .github/workflows/publish-swetrace-image.yaml
      - experiments/swe_rebench_trace/Dockerfile

permissions:
  contents: read
  packages: write

jobs:
  publish-swetrace-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set tags
        id: set-tags
        run: |
          echo "DATE_TAG=$(date -u +'%Y%m%d')" >> "$GITHUB_OUTPUT"
          echo "HASH_TAG=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push iris-task-swetrace
        run: |
          docker buildx build --file experiments/swe_rebench_trace/Dockerfile \
            --target task-swetrace \
            --cache-from type=registry,ref=ghcr.io/marin-community/iris-cache:task-swetrace \
            --cache-to type=registry,ref=ghcr.io/marin-community/iris-cache:task-swetrace,mode=max \
            --output type=image,compression=zstd,compression-level=3,push=true \
            --provenance=false \
            --tag ghcr.io/marin-community/iris-task-swetrace:latest \
            --tag ghcr.io/marin-community/iris-task-swetrace:${{ steps.set-tags.outputs.DATE_TAG }} \
            --tag ghcr.io/marin-community/iris-task-swetrace:${{ steps.set-tags.outputs.HASH_TAG }} \
            .
