name: "Marin - Canary Ferry - CoreWeave"

# The canary submits a small training job to the shared `iris-ci` controller
# and reuses the warm `iris-ci-h100-8x` NodePool. We do *not* provision a
# separate H100 — CoreWeave's account quota in US-WEST-04A only allows one
# `gd-8xh100ib-i128` at a time, which the permanent iris-ci nodepool holds.
#
# `iris cluster start --fresh` rebuilds the controller/worker/task images from
# the current checkout and rolls the shared controller deployment to pick them
# up. The shared concurrency group `iris-coreweave-ci-shared` serialises this
# workflow with iris-smoke-coreweave.yaml so PR CI and the cron canary never roll
# the controller at the same time.
on:
  schedule:
    - cron: '0 10 * * *'  # Daily at 10 AM UTC
  workflow_dispatch:
    inputs:
      target_tokens:
        description: 'Override training token budget'
        type: number
        required: false

permissions:
  contents: read   # actions/checkout
  packages: write  # docker login ghcr.io for iris cluster start
  issues: write    # claude triage files issues
  id-token: write  # claude-code-action OIDC

# Serialise with iris-smoke-coreweave.yaml — both rebuild/roll the shared
# iris-ci controller and submit jobs against the shared H100, so only one
# run is allowed cluster-wide at a time. cancel-in-progress=false so a
# mid-flight CI integration run is not killed by the cron firing.
concurrency:
  group: iris-coreweave-ci-shared
  cancel-in-progress: false

jobs:
  canary-ferry-cw:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      RUN_ID: canary-gpu-${{ github.run_id }}-${{ github.run_attempt }}
      CANARY_ACCELERATOR: gpu
      CANARY_BATCH_SIZE: "16"
      CANARY_TARGET_TOKENS: "6553600"
      CANARY_MIN_STEPS: "40"
      CANARY_MAX_LOSS: "8.0"
      WANDB_ENTITY: marin-community
      WANDB_PROJECT: marin
      IRIS_CONFIG: lib/iris/examples/coreweave-ci.yaml
      IRIS_NAMESPACE: iris-ci
      IRIS_MANAGED_LABEL: iris-iris-ci-managed

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-packages --extra=cpu --extra=controller --no-default-groups

      - name: Write CoreWeave kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.CW_KUBECONFIG }}" > ~/.kube/coreweave-iris
          chmod 600 ~/.kube/coreweave-iris

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Clear leftover task pods from the previous run (canary or PR CI) so the
      # autoscaler recreates them with the images we're about to push.
      # NodePools survive — the H100 node is warm.
      - name: Reset stale task pods
        run: |
          export KUBECONFIG=~/.kube/coreweave-iris
          kubectl delete pods -n "$IRIS_NAMESPACE" -l "$IRIS_MANAGED_LABEL=true" \
            --grace-period=0 --ignore-not-found || true

      - name: Start shared iris-ci controller
        env:
          BUILDKIT_PROGRESS: plain
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: .venv/bin/iris -v --config=${{ env.IRIS_CONFIG }} cluster start --fresh

      - name: Port-forward to iris-ci controller
        run: |
          export KUBECONFIG=~/.kube/coreweave-iris
          kubectl rollout status deployment/iris-controller -n "$IRIS_NAMESPACE" --timeout=120s
          kubectl wait pod -n "$IRIS_NAMESPACE" -l app=iris-controller \
            --for=condition=Ready --timeout=60s

          LOCAL_PORT=$(python3 -c "import socket; s=socket.socket(); s.bind(('',0)); print(s.getsockname()[1]); s.close()")
          kubectl port-forward -n "$IRIS_NAMESPACE" svc/iris-ci-controller-svc "${LOCAL_PORT}:10000" &
          PF_PID=$!
          echo "PF_PID=$PF_PID" >> "$GITHUB_ENV"
          echo "LOCAL_PORT=$LOCAL_PORT" >> "$GITHUB_ENV"
          echo "IRIS_CONTROLLER_URL=http://localhost:${LOCAL_PORT}" >> "$GITHUB_ENV"

          # Konnectivity can take ~20s to become usable after controller restart.
          for i in $(seq 1 60); do
            if ! kill -0 "$PF_PID" 2>/dev/null; then
              kubectl port-forward -n "$IRIS_NAMESPACE" svc/iris-ci-controller-svc "${LOCAL_PORT}:10000" &
              PF_PID=$!
              echo "PF_PID=$PF_PID" >> "$GITHUB_ENV"
              sleep 2
              continue
            fi
            if curl -sf "http://localhost:${LOCAL_PORT}/health" > /dev/null 2>&1; then
              echo "Controller healthy on localhost:${LOCAL_PORT}"
              exit 0
            fi
            sleep 5
          done
          echo "Controller did not become healthy within timeout"
          exit 1

      - name: Submit canary ferry
        id: submit
        shell: bash -l {0}
        run: |
          JOB_ID=$(.venv/bin/iris --controller-url="$IRIS_CONTROLLER_URL" \
            job run --no-wait \
            --memory=2G --disk=4G --cpu=1 --extra=cpu \
            -e MARIN_PREFIX s3://marin-na/marin/ \
            -e RUN_ID "$RUN_ID" \
            -e CANARY_ACCELERATOR "$CANARY_ACCELERATOR" \
            -e CANARY_BATCH_SIZE "$CANARY_BATCH_SIZE" \
            -e CANARY_TARGET_TOKENS "$CANARY_TARGET_TOKENS" \
            -e WANDB_ENTITY "$WANDB_ENTITY" \
            -e WANDB_PROJECT "$WANDB_PROJECT" \
            -e WANDB_API_KEY "$WANDB_API_KEY" \
            -e HF_TOKEN "$HF_TOKEN" \
            -e AWS_ACCESS_KEY_ID "$R2_ACCESS_KEY_ID" \
            -e AWS_SECRET_ACCESS_KEY "$R2_SECRET_ACCESS_KEY" \
            -e AWS_ENDPOINT_URL "https://74981a43be0de7712369306c7b19133d.r2.cloudflarestorage.com" \
            -- python -m experiments.ferries.canary_ferry)
          echo "job_id=$JOB_ID" >> "$GITHUB_OUTPUT"
          echo "Submitted job: $JOB_ID"
        env:
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CANARY_TARGET_TOKENS: ${{ inputs.target_tokens || env.CANARY_TARGET_TOKENS }}

      - name: Wait for canary ferry
        shell: bash -l {0}
        run: |
          uv run python scripts/workflows/iris_monitor.py wait \
            --job-id "${{ steps.submit.outputs.job_id }}" \
            --controller-url "$IRIS_CONTROLLER_URL" \
            --poll-interval 30 \
            --timeout 10500 \
            --github-output

      - name: Validate canary metrics
        continue-on-error: ${{ inputs.target_tokens != '' }}
        shell: bash -l {0}
        run: .venv/bin/python scripts/canary/validate_canary_metrics.py
        env:
          MARIN_PREFIX: s3://marin-na/marin/
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: https://74981a43be0de7712369306c7b19133d.r2.cloudflarestorage.com

      - name: Summarize GPU canary profile
        continue-on-error: true
        shell: bash -l {0}
        run: |
          .venv/bin/python -m marin.profiling.cli summarize \
            --run-target "$RUN_ID" \
            --entity "$WANDB_ENTITY" \
            --project "$WANDB_PROJECT"
        env:
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}

      - name: Capture failure diagnostics
        # Runs on both failures and cancellations — GHA timeouts surface as
        # cancelled(), not failure(). That gap hid two weeks of hung H100
        # provisioning before we noticed.
        if: failure() || cancelled()
        continue-on-error: true
        env:
          JOB_ID: ${{ steps.submit.outputs.job_id }}
          DIAG_DIR: /tmp/canary-diag
        run: |
          mkdir -p "$DIAG_DIR"

          uv run python scripts/workflows/iris_monitor.py collect \
            --job-id "$JOB_ID" \
            --controller-url "$IRIS_CONTROLLER_URL" \
            --provider coreweave \
            --output-dir "$DIAG_DIR" \
            --namespace "$IRIS_NAMESPACE" \
            --kubeconfig "$HOME/.kube/coreweave-iris"

          # Additional cluster-wide diagnostics not covered by iris_monitor.py collect.
          # $HOME, not ~: tilde inside a double-quoted string is NOT expanded
          # by bash. Passing "~/.kube/..." to kubectl makes it stat a literal
          # "~" path and emit 'no such file or directory'.
          KCI="kubectl --kubeconfig $HOME/.kube/coreweave-iris"

          echo "=== NodePools (cluster-wide) ==="
          # Canary hangs are often account-wide GPU capacity contention; dump
          # every nodepool, not just this namespace's.
          $KCI get nodepools.compute.coreweave.com -A -o wide \
            | tee "$DIAG_DIR/nodepools.txt" || true
          $KCI get nodepools.compute.coreweave.com -A -o yaml \
            > "$DIAG_DIR/nodepools.yaml" || true
          echo "=== Nodes ==="
          $KCI get nodes -o wide | tee "$DIAG_DIR/nodes.txt" || true
          echo "=== Iris autoscaler / scheduler state ==="
          .venv/bin/iris --controller-url="$IRIS_CONTROLLER_URL" \
            rpc controller get-autoscaler-status \
            > "$DIAG_DIR/autoscaler-status.txt" 2>&1 || true
          .venv/bin/iris --controller-url="$IRIS_CONTROLLER_URL" \
            rpc controller get-scheduler-state \
            > "$DIAG_DIR/scheduler-state.txt" 2>&1 || true
          cat "$DIAG_DIR/autoscaler-status.txt" || true

      - name: Upload diagnostics bundle
        if: failure() || cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: canary-diag-${{ github.run_id }}
          path: /tmp/canary-diag
          if-no-files-found: ignore
          retention-days: 30

      - name: Claude triage
        id: claude_triage
        if: (failure() || cancelled()) && github.event_name == 'schedule'
        uses: anthropics/claude-code-action@fefa07e9c665b7320f08c3b525980457f22f58aa  # v1
        timeout-minutes: 30
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN || secrets.CLAUDE_MAX_OAUTH_TOKEN }}
          prompt: |
            Read .agents/skills/canary-triage/SKILL.md and follow it.
          claude_args: |
            --model opus
            --max-turns 500
            --allowedTools "Bash(kubectl:*),Bash(gh:*),Bash(.venv/bin/iris:*),Bash(.venv/bin/python:*),Bash(cat:*),Bash(jq:*),Bash(head:*),Bash(tail:*),Bash(grep:*),Bash(ls:*),Bash(wc:*),Bash(find:*),Bash(awk:*),Bash(sed:*),Bash(date:*),Bash(echo:*),Bash(tr:*),Bash(sort:*),Bash(uniq:*),Bash(curl:*),Write,Read,Edit"
        env:
          CANARY_LANE: gpu
          CANARY_JOB_ID: ${{ steps.submit.outputs.job_id }}
          CANARY_RUN_ID: ${{ env.RUN_ID }}
          IRIS_CONFIG: ${{ env.IRIS_CONFIG }}
          IRIS_NAMESPACE: ${{ env.IRIS_NAMESPACE }}
          WANDB_ENTITY: ${{ env.WANDB_ENTITY }}
          WANDB_PROJECT: ${{ env.WANDB_PROJECT }}
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          GHA_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      # claude-code-action writes the full agent trace (prompt, tool calls,
      # tool results, final message) to this path. Uploading it is the only
      # way to see *what Claude actually did* after the fact — the step log
      # hides the transcript with "full output hidden for security".
      - name: Upload Claude triage log
        if: (failure() || cancelled()) && github.event_name == 'schedule'
        uses: actions/upload-artifact@v4
        with:
          name: claude-triage-log-${{ github.run_id }}
          path: /home/runner/work/_temp/claude-execution-output.json
          retention-days: 30
          if-no-files-found: warn

      # Upload Claude's Slack message (if it was written) so the separate
      # notify-slack job can pick it up. We run Slack notify in a separate
      # job because a job-level timeout can force-kill this runner before
      # in-job steps after Claude triage ever execute — see
      # https://github.com/marin-community/marin/actions/runs/24498461666.
      - name: Upload Slack message
        if: failure() || cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: slack-message
          path: slack_message.md
          retention-days: 1
          if-no-files-found: ignore

      - name: Stop port-forward
        if: always()
        run: |
          [ -n "$PF_PID" ] && kill "$PF_PID" 2>/dev/null || true
          pkill -f "kubectl port-forward.*$IRIS_NAMESPACE" 2>/dev/null || true

  # Separate job so Slack always fires, even if the main job is force-killed
  # after its grace window. `needs.canary-ferry-cw.result` reflects the main
  # job outcome; failure()/cancelled() context functions only see this job's
  # steps.
  notify-slack:
    needs: canary-ferry-cw
    if: always() && (needs.canary-ferry-cw.result == 'failure' || needs.canary-ferry-cw.result == 'cancelled') && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Download Slack message
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: slack-message

      - name: Notify Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          FALLBACK_TEXT: ":red_circle: *GPU Canary failed*\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: |
          if [ -f slack_message.md ]; then
            TEXT=$(cat slack_message.md)
          else
            TEXT="$FALLBACK_TEXT"
          fi
          PAYLOAD=$(python3 -c "import sys,json; print(json.dumps({'text': sys.stdin.read()}))" <<< "$TEXT")
          curl -sf -X POST -H 'Content-Type: application/json' -d "$PAYLOAD" "$SLACK_WEBHOOK_URL"
