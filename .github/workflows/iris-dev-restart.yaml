name: "Iris - Dev Restart"

on:
  schedule:
    # Daily at 05:00 UTC — staggered before canary ferry (06:00 UTC)
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: iris-dev-restart
  cancel-in-progress: false

jobs:
  restart:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      IRIS_CONTROLLER_SERVICE_ACCOUNT: iris-controller@hai-gcp-models.iam.gserviceaccount.com
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python 3.12
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "lib/iris/pyproject.toml"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          credentials_json: ${{ secrets.IRIS_CI_GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@26f734c2779b00b7dda794207734c511110a4368 # v3.0.0
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set up OS Login SSH key
        run: |
          mkdir -p ~/.ssh
          ssh-keygen -t rsa -b 4096 -f ~/.ssh/google_compute_engine -N "" -q -C "gha-${{ github.run_id }}-${{ github.run_attempt }}"
          chmod 600 ~/.ssh/google_compute_engine
          gcloud compute os-login ssh-keys add \
            --key-file ~/.ssh/google_compute_engine.pub \
            --impersonate-service-account="$IRIS_CONTROLLER_SERVICE_ACCOUNT" \
            --ttl=2h

      - name: Restart dev controller
        run: |
          uv run iris --config lib/iris/examples/marin-dev.yaml \
            cluster controller restart

      - name: Remove OS Login SSH key
        if: always()
        run: |
          gcloud compute os-login ssh-keys remove \
            --impersonate-service-account="$IRIS_CONTROLLER_SERVICE_ACCOUNT" \
            --key-file ~/.ssh/google_compute_engine.pub || true
