name: Marin - Canary Ferry

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC
  workflow_dispatch:

jobs:
  canary-ferry:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    concurrency:
      group: canary-ferry
      cancel-in-progress: true
    env:
      RUN_ID: canary-tpu-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-packages --extra=tpu --no-default-groups

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Write SSH key and Ray token
        run: |
          mkdir -p ~/.ssh ~/.ray
          echo "${{ secrets.MARIN_SSH_KEY }}" > ~/.ssh/marin_ray_cluster.pem
          chmod 600 ~/.ssh/marin_ray_cluster.pem
          echo "${{ secrets.RAY_AUTH_TOKEN }}" > ~/.ray/auth_token
          chmod 600 ~/.ray/auth_token

      - name: Submit canary ferry to Ray cluster
        shell: bash -l {0}
        run: |
          .venv/bin/python lib/marin/src/marin/run/ray_run.py \
            --cluster us-central1 \
            -e RUN_ID "$RUN_ID" \
            -- python experiments/ferries/canary_ferry.py
        env:
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Validate canary metrics
        shell: bash -l {0}
        run: .venv/bin/python scripts/canary/validate_canary_metrics.py

      # Keep these profiling post-run steps in sync with
      # `.github/workflows/marin-canary-ferry-cw.yaml`.
      - name: Summarize TPU canary profile
        shell: bash -l {0}
        run: |
          .venv/bin/python -m marin.profiling.cli summarize \
            --run-target "marin-community/marin/$RUN_ID" \
            --output profile_summary.json
          .venv/bin/python -m marin.profiling.cli report \
            --summary profile_summary.json \
            --output profile_report.md
        env:
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}

      - name: Add profile digest to step summary
        shell: bash -l {0}
        run: |
          .venv/bin/python -m marin.profiling.cli digest \
            --summary profile_summary.json \
            --title "TPU Canary Profile Digest" \
            --top-k 5 \
            --output profile_digest.md
          cat profile_digest.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload TPU canary profile artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tpu-canary-profile-${{ env.RUN_ID }}
          path: |
            profile_summary.json
            profile_report.md
            profile_digest.md
