name: Marin - Canary Ferry

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC
  workflow_dispatch:
    inputs:
      target_tokens:
        description: 'Override training token budget'
        type: number
        required: false

permissions:
  contents: read
  issues: write    # claude triage files issues
  id-token: write  # claude-code-action OIDC

jobs:
  canary-ferry:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    concurrency:
      group: canary-ferry
      cancel-in-progress: true
    env:
      RUN_ID: canary-tpu-${{ github.run_id }}-${{ github.run_attempt }}
      CANARY_ACCELERATOR: tpu
      CANARY_BATCH_SIZE: "512"
      CANARY_TARGET_TOKENS: "1000000000"
      CANARY_MIN_STEPS: "400"
      CANARY_MAX_LOSS: "8.0"
      CANARY_MAX_WALL_CLOCK: "7200"
      WANDB_ENTITY: marin-community
      WANDB_PROJECT: marin
      IRIS_CONFIG: lib/iris/examples/marin.yaml
      IRIS_CONTROLLER_SERVICE_ACCOUNT: iris-controller@hai-gcp-models.iam.gserviceaccount.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-packages --extra=cpu --no-default-groups

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.IRIS_CI_GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Set up OS Login SSH key
        run: |
          mkdir -p ~/.ssh
          ssh-keygen -t rsa -b 4096 -f ~/.ssh/google_compute_engine -N "" -q -C "gha-${{ github.run_id }}-${{ github.run_attempt }}"
          chmod 600 ~/.ssh/google_compute_engine
          gcloud compute os-login ssh-keys add \
            --key-file ~/.ssh/google_compute_engine.pub \
            --impersonate-service-account="$IRIS_CONTROLLER_SERVICE_ACCOUNT" \
            --ttl=6h

      - name: Submit canary ferry
        id: submit
        shell: bash -l {0}
        run: |
          JOB_ID=$(.venv/bin/iris --config=${{ env.IRIS_CONFIG }} \
            job run --no-wait \
            --memory=2G --disk=4G --cpu=1 --extra=cpu \
            --priority production \
            --reserve v5p-8 \
            -e RUN_ID "$RUN_ID" \
            -e CANARY_ACCELERATOR "$CANARY_ACCELERATOR" \
            -e CANARY_BATCH_SIZE "$CANARY_BATCH_SIZE" \
            -e CANARY_TARGET_TOKENS "$CANARY_TARGET_TOKENS" \
            -e WANDB_ENTITY "$WANDB_ENTITY" \
            -e WANDB_PROJECT "$WANDB_PROJECT" \
            -e WANDB_API_KEY "$WANDB_API_KEY" \
            -e HF_TOKEN "$HF_TOKEN" \
            -- python -m experiments.ferries.canary_ferry)
          echo "job_id=$JOB_ID" >> "$GITHUB_OUTPUT"
          echo "Submitted job: $JOB_ID"
        env:
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          CANARY_TARGET_TOKENS: ${{ inputs.target_tokens || env.CANARY_TARGET_TOKENS }}

      - name: Wait for canary ferry
        shell: bash -l {0}
        run: |
          JOB_ID="${{ steps.submit.outputs.job_id }}"
          echo "Polling job status: $JOB_ID"
          while true; do
            STATE=$(.venv/bin/iris --config=${{ env.IRIS_CONFIG }} \
              job list --json --prefix "$JOB_ID" \
              | jq -r --arg id "$JOB_ID" '[.[] | select(.job_id == $id)][0].state // empty')
            case "$STATE" in
              JOB_STATE_SUCCEEDED)
                echo "Job succeeded"
                exit 0
                ;;
              JOB_STATE_PENDING|JOB_STATE_BUILDING|JOB_STATE_RUNNING)
                echo "$(date -u +%H:%M:%S) Job state: $STATE"
                sleep 30
                ;;
              "")
                echo "Job not found: $JOB_ID"
                exit 1
                ;;
              *)
                echo "Job finished with state: $STATE"
                .venv/bin/iris --config=${{ env.IRIS_CONFIG }} \
                  job list --json --prefix "$JOB_ID" \
                  | jq --arg id "$JOB_ID" '.[] | {job_id, state, error}' || true
                exit 1
                ;;
            esac
          done

      - name: Validate canary metrics
        continue-on-error: ${{ inputs.target_tokens != '' }}
        shell: bash -l {0}
        run: .venv/bin/python scripts/canary/validate_canary_metrics.py

      - name: Summarize TPU canary profile
        continue-on-error: true
        shell: bash -l {0}
        run: |
          .venv/bin/python -m marin.profiling.cli summarize \
            --run-target "$RUN_ID" \
            --entity "$WANDB_ENTITY" \
            --project "$WANDB_PROJECT"
        env:
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}

      - name: Capture failure diagnostics
        if: failure() || cancelled()
        env:
          JOB_ID: ${{ steps.submit.outputs.job_id }}
          DIAG_DIR: ${{ github.workspace }}/canary-diagnostics
          PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          CONTROLLER_LABEL: iris-marin-controller
        run: |
          mkdir -p "$DIAG_DIR"

          echo "=== Controller process logs ==="
          .venv/bin/iris --config=${{ env.IRIS_CONFIG }} \
            process logs --max-lines=500 > "$DIAG_DIR/controller-process.log" 2>&1 || true

          echo "=== Job tree for $JOB_ID ==="
          .venv/bin/iris --config=${{ env.IRIS_CONFIG }} \
            job list --json --prefix "$JOB_ID" > "$DIAG_DIR/job-tree.json" 2>&1 || true
          jq '.' "$DIAG_DIR/job-tree.json" || true

          # SSH to the controller VM: grab docker logs + SQLite rows for this job.
          # Matches the approach in iris-cloud-smoke-gcp.yaml.
          gcloud compute instances list \
            --project="$PROJECT" \
            --filter="labels.${CONTROLLER_LABEL}=true" \
            --format="csv[no-heading](name,zone)" 2>/dev/null \
          | while IFS=, read -r name zone; do
              [ -z "$name" ] && continue
              echo "Fetching host logs from controller $name ($zone)"
              out="$DIAG_DIR/controller-${name}"
              gcloud compute ssh "$name" \
                --project="$PROJECT" --zone="$zone" \
                --impersonate-service-account="$IRIS_CONTROLLER_SERVICE_ACCOUNT" \
                --ssh-key-file ~/.ssh/google_compute_engine \
                --quiet \
                --command "
                set +e
                echo '=== docker ps -a ==='
                sudo docker ps -a
                echo '=== docker logs iris-controller (last 5000 lines) ==='
                sudo docker logs --timestamps --tail 5000 iris-controller 2>&1
                echo '=== jobs+tasks for $JOB_ID ==='
                sudo docker exec iris-controller python3 -c \"
          import sqlite3, json
          c = sqlite3.connect('/var/cache/iris/controller/db/controller.sqlite3')
          c.row_factory = sqlite3.Row
          prefix = '$JOB_ID'
          rows = list(c.execute('SELECT * FROM jobs WHERE job_id = ? OR parent_job_id LIKE ? OR job_id LIKE ?', (prefix, prefix + '%', prefix + '%')))
          for r in rows: print('JOB', json.dumps(dict(r), default=str))
          for r in rows:
              for t in c.execute('SELECT * FROM tasks WHERE job_id = ?', (r['job_id'],)):
                  print('TASK', json.dumps(dict(t), default=str))
                  for a in c.execute('SELECT * FROM task_attempts WHERE task_id = ?', (t['task_id'],)):
                      print('ATTEMPT', json.dumps(dict(a), default=str))
          \"
              " > \"\${out}.log\" 2>&1 || echo \"ssh to \$name failed (see \${out}.log)\"
            done

      - name: Upload diagnostics
        if: failure() || cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: canary-diagnostics
          path: canary-diagnostics/
          retention-days: 14
          if-no-files-found: ignore

      - name: Claude triage
        id: claude_triage
        if: (failure() || cancelled()) && github.event_name == 'schedule'
        uses: anthropics/claude-code-action@v1
        timeout-minutes: 30
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN || secrets.CLAUDE_MAX_OAUTH_TOKEN }}
          prompt: |
            Read .agents/skills/canary-triage/SKILL.md and follow it.
          claude_args: |
            --model opus
            --max-turns 500
            --allowedTools "Bash(gh:*),Bash(.venv/bin/iris:*),Bash(.venv/bin/python:*),Bash(cat:*),Bash(jq:*),Bash(head:*),Bash(tail:*),Bash(grep:*)"
        env:
          CANARY_LANE: tpu
          CANARY_JOB_ID: ${{ steps.submit.outputs.job_id }}
          CANARY_RUN_ID: ${{ env.RUN_ID }}
          IRIS_CONFIG: ${{ env.IRIS_CONFIG }}
          WANDB_ENTITY: ${{ env.WANDB_ENTITY }}
          WANDB_PROJECT: ${{ env.WANDB_PROJECT }}
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          GHA_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Notify Slack on failure
        if: (failure() || cancelled()) && github.event_name == 'schedule'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          FALLBACK_TEXT: ":red_circle: *TPU Canary failed*\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: |
          if [ -f slack_message.md ]; then
            TEXT=$(cat slack_message.md)
          else
            TEXT="$FALLBACK_TEXT"
          fi
          PAYLOAD=$(python3 -c "import sys,json; print(json.dumps({'text': sys.stdin.read()}))" <<< "$TEXT")
          curl -sf -X POST -H 'Content-Type: application/json' -d "$PAYLOAD" "$SLACK_WEBHOOK_URL"

      - name: Remove OS Login SSH key
        if: always()
        run: |
          gcloud compute os-login ssh-keys remove \
            --impersonate-service-account="$IRIS_CONTROLLER_SERVICE_ACCOUNT" \
            --key-file ~/.ssh/google_compute_engine.pub || true
