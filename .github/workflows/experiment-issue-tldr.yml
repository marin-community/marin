name: Experiment Issue TL;DR Scrub

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Optional single issue number to scrub"
        required: false
        type: string
      max_issues:
        description: "Maximum number of issues to inspect"
        required: false
        default: "10"
        type: string
      refresh_existing:
        description: "Refresh issues that already have a managed TL;DR block and the tldr label"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  issues: write
  actions: read
  id-token: write

concurrency:
  group: experiment-issue-tldr
  cancel-in-progress: false

jobs:
  scrub:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Select candidate issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          args=(--repo "${{ github.repository }}" --pretty)
          if [ -n "${{ github.event.inputs.issue_number }}" ]; then
            args+=(--issue-number "${{ github.event.inputs.issue_number }}")
          fi
          if [ -n "${{ github.event.inputs.max_issues }}" ]; then
            args+=(--max-issues "${{ github.event.inputs.max_issues }}")
          fi
          if [ "${{ github.event.inputs.refresh_existing }}" = "true" ]; then
            args+=(--refresh-existing)
          fi
          uv run --script scripts/pm/scrub_experiment_issue_tldrs.py "${args[@]}" > /tmp/experiment_issue_tldr_candidates.json
          cat /tmp/experiment_issue_tldr_candidates.json

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN || secrets.CLAUDE_MAX_OAUTH_TOKEN }}
          allowed_bots: "claude[bot]"
          additional_permissions: |
            actions: read
          prompt: |
            Read AGENTS.md, [docs/explanations/guidelines.md](docs/explanations/guidelines.md), [.agents/skills/handle-gh-scrub/SKILL.md](.agents/skills/handle-gh-scrub/SKILL.md), and [.agents/skills/scrub-experiment-issue-tldrs/SKILL.md](.agents/skills/scrub-experiment-issue-tldrs/SKILL.md).

            The candidate discovery step wrote JSON to `/tmp/experiment_issue_tldr_candidates.json`.
            Use that file as the source of truth for which issues to process, and follow the scrub skill exactly. The script is only a candidate/context selector; the skill defines the desired output and workflow.

            Constraints:
            - Do not use `OPENAI_API_KEY` or any separate model API key.
            - Do the summarization yourself inside this agent run.
            - Use `gh issue edit`, `gh issue comment`, and `gh api` as needed.
            - Only mutate GitHub issues selected by the candidate JSON for this run.
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 200
            --allowedTools "Bash(gh:*),Bash(python:*),Bash(cat:*),Bash(jq:*),Bash(sed:*)"
