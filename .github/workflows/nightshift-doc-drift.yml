name: Nightshift Doc Drift

on:
  schedule:
    # Run weekly on Sunday at 3 AM Pacific (11:00 UTC)
    - cron: '0 11 * * 0'
  workflow_dispatch: {}

concurrency:
  group: nightshift-doc-drift
  cancel-in-progress: false

jobs:
  doc-drift:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Load doc-drift prompt
        id: prompt
        run: |
          PROMPT=$(cat infra/scripts/nightshift/doc_drift_prompt.md)
          PROMPT="${PROMPT//\{\{run_id\}\}/${{ github.run_id }}}"
          PROMPT="${PROMPT//\{\{run_attempt\}\}/${{ github.run_attempt }}}"
          EOF_MARKER=$(openssl rand -hex 16)
          echo "value<<${EOF_MARKER}" >> "$GITHUB_OUTPUT"
          echo "$PROMPT" >> "$GITHUB_OUTPUT"
          echo "${EOF_MARKER}" >> "$GITHUB_OUTPUT"

      - name: Detect documentation drift
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: 'claude[bot]'
          direct_prompt: true
          prompt: ${{ steps.prompt.outputs.value }}
          claude_args: |
            --model opus
            --max-turns 60
            --allowedTools "Read,Write,Edit,Glob,Grep,Bash(git:*),Bash(./infra/pre-commit.py:*),Bash(uv:*),Bash(gh:*),Bash(python:*)"
