name: "Buoy - Unit"
on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      should_run: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4
        id: filter
        with:
          filters: |
            relevant:
              - 'lib/buoy/**'
              - 'lib/iris/**'
              - 'lib/rigging/**'
              - 'uv.lock'
              - '.github/workflows/buoy-unit.yaml'

  buoy-unit:
    needs: changes
    if: needs.changes.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          uv sync --package marin-buoy --group test --frozen

      - name: Test with pytest
        run: |
          uv run --package marin-buoy --frozen pytest --durations=5 --tb=short -v lib/buoy/tests/
