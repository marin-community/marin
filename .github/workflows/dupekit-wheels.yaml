name: Dupekit - Build Wheels

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "rust/dupekit/**"
      - ".github/workflows/dupekit-wheels.yaml"
    tags:
      - "dupekit-v*"
  pull_request:
    paths:
      - "rust/dupekit/**"
      - ".github/workflows/dupekit-wheels.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write  # for creating releases
  pull-requests: write  # for create-pull-request

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: ubuntu-latest
            target: aarch64
          - os: macos-13
            target: x86_64
          - os: macos-14
            target: aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --manifest-path rust/dupekit/Cargo.toml
          target: ${{ matrix.target }}
          manylinux: 2_28

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*.whl

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --manifest-path rust/dupekit/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  release:
    if: startsWith(github.ref, 'refs/tags/dupekit-v')
    needs: [build, sdist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  update-release:
    if: github.ref == 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/')
    needs: [build, sdist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: dupekit-latest
          name: "dupekit (latest wheels)"
          prerelease: true
          make_latest: false
          files: dist/*

  update-pyproject:
    if: github.ref == 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/')
    needs: [update-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update pyproject.toml with dupekit wheel references
        run: |
          set -euo pipefail

          # Read version from Cargo.toml
          VERSION=$(grep '^version' rust/dupekit/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "Dupekit version: $VERSION"

          FIND_LINKS_URL="https://github.com/marin-community/marin/releases/expanded_assets/dupekit-latest"

          # Ensure find-links contains the rolling release URL (uncommented)
          if grep -q "^#.*find-links.*dupekit-latest" pyproject.toml; then
            # Uncomment the existing commented-out line
            sed -i "s|^#.*find-links.*dupekit-latest.*|find-links = [\"${FIND_LINKS_URL}\"]|" pyproject.toml
          elif ! grep -q "find-links.*dupekit-latest" pyproject.toml; then
            # Add find-links after [tool.uv] section header
            sed -i "/^\[tool\.uv\]/a find-links = [\"${FIND_LINKS_URL}\"]" pyproject.toml
          fi

          # Update dupekit version pin in dependencies
          sed -i "s|\"dupekit[^\"]*\"|\"dupekit >= ${VERSION}\"|" pyproject.toml

          # Remove dupekit from [tool.uv.sources] (path-based source)
          sed -i '/^dupekit\s*=\s*{.*path.*/d' pyproject.toml

      - uses: peter-evans/create-pull-request@v7
        with:
          branch: auto/update-dupekit-wheels
          title: "chore: update dupekit wheels"
          body: "Auto-generated: updates pyproject.toml to use latest dupekit wheels from GitHub Releases."
          labels: agent-generated
          commit-message: "chore: update dupekit wheel references in pyproject.toml"
