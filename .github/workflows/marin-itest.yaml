name: Marin - Integration Test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      controller_url:
        description: "Iris controller URL"
        required: true


jobs:
  marin-itest:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    concurrency:
      group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        # `--no-default-groups` keeps uv from also installing every workspace package's
        # dev/docs/test groups (e.g. `levanter[docs,test,dev]`), which saves multiple
        # minutes and avoids re-downloading CUDA wheels unnecessarily on cold caches.
        run: uv sync --all-packages --extra=cpu --extra=dedup --no-default-groups

      - name: Check df -h
        run: df -h

      - name: Run the integration test
        run: uv run tests/integration_test.py --controller-url ${{ inputs.controller_url }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          JAX_TRACEBACK_FILTERING: off
          WANDB_MODE: offline
