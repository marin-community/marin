name: Nightshift Cleanup

on:
  schedule:
    # Run at 2 AM Pacific (10:00 UTC) on weekdays
    - cron: '0 10 * * 1-5'
  workflow_dispatch:
    inputs:
      agent_count:
        description: 'Number of cleanup agents to spawn (1-5)'
        required: false
        default: '5'
        type: choice
        options: ['1', '2', '3', '4', '5']
      target_folder:
        description: 'Specific folder to target (leave empty for random selection)'
        required: false
        type: string

concurrency:
  group: nightshift-cleanup
  cancel-in-progress: false

jobs:
  # Phase 1: Pick random folders for each agent
  plan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.pick.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Pick target folders
        id: pick
        env:
          AGENT_COUNT: ${{ inputs.agent_count || '5' }}
          TARGET_FOLDER: ${{ inputs.target_folder }}
        run: bash infra/scripts/nightshift/pick_cleanup_targets.sh

  # Phase 2: Spawn parallel cleanup agents
  cleanup:
    needs: plan
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
      fail-fast: false
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Load cleanup prompt
        id: prompt
        run: |
          PROMPT=$(cat infra/scripts/nightshift/cleanup_prompt.md)
          PROMPT="${PROMPT//\{\{agent_id\}\}/${{ matrix.agent_id }}}"
          PROMPT="${PROMPT//\{\{haiku_seed\}\}/${{ matrix.haiku_seed }}}"
          PROMPT="${PROMPT//\{\{folder\}\}/${{ matrix.folder }}}"
          EOF_MARKER=$(openssl rand -hex 16)
          echo "value<<${EOF_MARKER}" >> "$GITHUB_OUTPUT"
          echo "$PROMPT" >> "$GITHUB_OUTPUT"
          echo "${EOF_MARKER}" >> "$GITHUB_OUTPUT"

      - name: Run Cleanup Agent ${{ matrix.agent_id }}
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: 'claude[bot]'
          direct_prompt: true
          prompt: ${{ steps.prompt.outputs.value }}
          claude_args: |
            --model opus
            --max-turns 80
            --allowedTools "Read,Write,Edit,Glob,Grep,Bash(git:*),Bash(./infra/pre-commit.py:*),Bash(uv:*),Bash(gh:*),Bash(python:*)"
