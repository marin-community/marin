name: Iris - Cloud Smoke Test (CoreWeave)

on:
  issue_comment:
    types: [created]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  statuses: write

concurrency:
  group: iris-cloud-smoke-cw-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: true

jobs:
  cw-cloud-smoke-test:
    # Run on: /iris-smoke-cw comment or manual dispatch
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        contains(github.event.comment.body, '/iris-smoke-cw') &&
        (
          github.event.comment.author_association == 'MEMBER' ||
          github.event.comment.author_association == 'COLLABORATOR' ||
          github.event.comment.author_association == 'OWNER'
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      label-prefix: ${{ steps.label.outputs.prefix }}
    steps:
      - name: Compute label prefix
        id: label
        run: |
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            echo "prefix=smoke-cw-pr-${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "prefix=smoke-cw-$(echo ${{ github.sha }} | head -c 8)" >> "$GITHUB_OUTPUT"
          fi

      - name: Set commit status to pending
        if: github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha || github.sha }} \
            -f state=pending \
            -f context="Iris Cloud Smoke Test (CW)" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'issue_comment' && format('refs/pull/{0}/head', github.event.issue.number) || '' }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "lib/iris/pyproject.toml"

      - name: Write kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.CW_KUBECONFIG }}" > ~/.kube/coreweave-iris
          chmod 600 ~/.kube/coreweave-iris

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start smoke cluster
        env:
          LABEL_PREFIX: ${{ steps.label.outputs.prefix }}
          MARIN_PREFIX: s3://marin-na
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          cd lib/iris && uv run --group dev iris -v \
            --config=examples/smoke-cw.yaml \
            cluster start-smoke \
            --label-prefix "$LABEL_PREFIX" \
            --url-file /tmp/iris-controller-url \
            --wait-for-workers 1 \
            --worker-timeout 900 &
          START_PID=$!
          echo "START_PID=$START_PID" >> "$GITHUB_ENV"
          for i in $(seq 1 450); do
            if [ -f /tmp/iris-controller-url ]; then
              echo "Cluster ready!"
              echo "IRIS_CONTROLLER_URL=$(cat /tmp/iris-controller-url)" >> "$GITHUB_ENV"
              break
            fi
            sleep 2
          done
          if [ ! -f /tmp/iris-controller-url ]; then
            echo "Timed out waiting for cluster"
            kill $START_PID 2>/dev/null || true
            exit 1
          fi

      - name: Run cloud smoke tests
        env:
          IRIS_SCREENSHOT_DIR: ${{ github.workspace }}/iris-cloud-screenshots
          PYTHONASYNCIODEBUG: "1"
        run: |
          mkdir -p ${{ github.workspace }}/iris-cloud-screenshots
          cd lib/iris && uv run --group dev python -m pytest \
            tests/e2e/test_smoke.py \
            -m e2e \
            --iris-controller-url "$IRIS_CONTROLLER_URL" \
            -o "addopts=" \
            --tb=short -v \
            --timeout=1200

      - name: Stop tunnel
        if: always()
        run: |
          kill $START_PID 2>/dev/null || true

      - name: Tear down smoke cluster
        if: always()
        env:
          LABEL_PREFIX: ${{ steps.label.outputs.prefix }}
        run: |
          cd lib/iris && uv run --group dev iris -v \
            --config=examples/smoke-cw.yaml \
            cluster stop --label "$LABEL_PREFIX" || true

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iris-cloud-smoke-cw-screenshots
          path: iris-cloud-screenshots/
          retention-days: 14
          if-no-files-found: ignore

  cw-cleanup:
    needs: cw-cloud-smoke-test
    if: ${{ always() && needs.cw-cloud-smoke-test.result != 'skipped' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      LABEL_PREFIX: ${{ needs.cw-cloud-smoke-test.outputs.label-prefix }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'issue_comment' && format('refs/pull/{0}/head', github.event.issue.number) || '' }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "lib/iris/pyproject.toml"

      - name: Write kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.CW_KUBECONFIG }}" > ~/.kube/coreweave-iris
          chmod 600 ~/.kube/coreweave-iris

      - name: Tear down cluster (iris stop)
        run: |
          cd lib/iris && uv run --group dev iris -v \
            --config=examples/smoke-cw.yaml \
            cluster stop --label "$LABEL_PREFIX" || true

      - name: Failsafe Kubernetes cleanup
        run: |
          export KUBECONFIG=~/.kube/coreweave-iris
          NAMESPACE="iris-smoke-cw"
          echo "Cleaning up Kubernetes resources with label prefix ${LABEL_PREFIX} in namespace ${NAMESPACE}..."
          kubectl delete pods,deployments,services,configmaps \
            -n "$NAMESPACE" \
            -l "iris-label-prefix=$LABEL_PREFIX" \
            --ignore-not-found || true

      - name: Set commit status to result
        if: github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sha=$(git rev-parse HEAD)
          if [ "${{ needs.cw-cloud-smoke-test.result }}" = "success" ]; then
            state=success
          else
            state=failure
          fi
          gh api repos/${{ github.repository }}/statuses/"$sha" \
            -f state="$state" \
            -f context="Iris Cloud Smoke Test (CW)" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
