name: "Marin - Canary - Datakit - Tier 2"

on:
  schedule:
    - cron: '0 7 * * *'  # Daily at 07:00 UTC, offset from datakit-smoke (06:30) and canary
  workflow_dispatch:

permissions:
  contents: read
  issues: write    # claude triage files issues
  id-token: write  # claude-code-action OIDC

jobs:
  datakit-tier2-ferry:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    concurrency:
      group: datakit-tier2-ferry
      cancel-in-progress: true
    env:
      SMOKE_RUN_ID: datakit-tier2-ferry-${{ github.run_id }}-${{ github.run_attempt }}
      FERRY_STATUS_PATH: gs://marin-us-central1/tmp/ttl=1d/ci/datakit-tier2-ferry-${{ github.run_id }}-${{ github.run_attempt }}/ferry_run_status.json
      WANDB_ENTITY: marin-community
      WANDB_PROJECT: marin
      IRIS_CONFIG: lib/iris/config/marin.yaml
      IRIS_CONTROLLER_SERVICE_ACCOUNT: iris-controller@hai-gcp-models.iam.gserviceaccount.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-packages --extra=cpu --no-default-groups

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.IRIS_CI_GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Install SSH key
        env:
          SSH_KEY: ${{ secrets.IRIS_CI_GCP_SSH_KEY }}
          SSH_KEY_PUB: ${{ secrets.IRIS_CI_GCP_SSH_KEY_PUB }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/google_compute_engine
          printf '%s\n' "$SSH_KEY_PUB" > ~/.ssh/google_compute_engine.pub
          chmod 600 ~/.ssh/google_compute_engine
          chmod 644 ~/.ssh/google_compute_engine.pub

      # If you change the iris flags below, also update the matching tier
      # entry in scripts/ci/submit_perf_run.py (TIERS["2"]) so the
      # evaluate-zephyr-perf skill's treatment job stays comparable to this baseline.
      - name: Submit datakit tier2 ferry
        id: submit
        shell: bash -l {0}
        run: |
          set -euo pipefail
          JOB_ID=$(.venv/bin/iris --config=${{ env.IRIS_CONFIG }} \
            job run --no-wait \
            --memory=2G \
            --extra=cpu \
            -e SMOKE_RUN_ID "$SMOKE_RUN_ID" \
            -e FERRY_STATUS_PATH "$FERRY_STATUS_PATH" \
            -e WANDB_ENTITY "$WANDB_ENTITY" \
            -e WANDB_PROJECT "$WANDB_PROJECT" \
            -e WANDB_API_KEY "$WANDB_API_KEY" \
            -e HF_TOKEN "$HF_TOKEN" \
            -- python -m experiments.ferries.datakit_tier2_skewed_ferry)
          if [ -z "$JOB_ID" ]; then
            echo "iris job run produced no job id" >&2
            exit 1
          fi
          echo "job_id=$JOB_ID" >> "$GITHUB_OUTPUT"
          echo "Submitted job: $JOB_ID"
        env:
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Wait for datakit tier2 ferry
        shell: bash -l {0}
        run: |
          uv run python scripts/ci/iris_monitor.py wait \
            --job-id "${{ steps.submit.outputs.job_id }}" \
            --iris-config "${{ env.IRIS_CONFIG }}" \
            --poll-interval 30 \
            --timeout 14400 \
            --github-output

      - name: Capture perf report
        if: success()
        shell: bash -l {0}
        run: |
          uv run python scripts/ci/collect_perf_metrics.py \
            --job-id "${{ steps.submit.outputs.job_id }}" \
            --iris-config "${{ env.IRIS_CONFIG }}" \
            --status "$FERRY_STATUS_PATH" \
            --report-name tier2 \
            --out perf-report.json \
            --gcs-prefix gs://marin-us-central1/infra/datakit/ferry_perf

      - name: Upload perf report
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: datakit-tier2-perf-report
          path: perf-report.json
          retention-days: 90

      - name: Capture failure diagnostics
        if: failure() || cancelled()
        continue-on-error: true
        env:
          JOB_ID: ${{ steps.submit.outputs.job_id }}
          DIAG_DIR: ${{ github.workspace }}/datakit-tier2-diagnostics
        run: |
          mkdir -p "$DIAG_DIR"
          uv run python scripts/ci/iris_monitor.py collect \
            --job-id "$JOB_ID" \
            --iris-config "${{ env.IRIS_CONFIG }}" \
            --provider gcp \
            --output-dir "$DIAG_DIR" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --controller-label iris-marin-controller \
            --service-account "$IRIS_CONTROLLER_SERVICE_ACCOUNT" \
            --ssh-key ~/.ssh/google_compute_engine

      - name: Upload diagnostics
        if: failure() || cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: datakit-tier2-diagnostics
          path: datakit-tier2-diagnostics/
          retention-days: 14
          if-no-files-found: ignore

      # lane id must be unique per canary: it flows into the [canary-{lane}] issue
      # title, so a shared id would collide with another tier's triage dedup.
      - name: Claude triage
        id: claude_triage
        if: (failure() || cancelled()) && github.event_name == 'schedule'
        uses: ./.github/actions/claude-triage
        timeout-minutes: 30
        with:
          oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN || secrets.CLAUDE_MAX_OAUTH_TOKEN }}
          lane: datakit-tier2
          job-id: ${{ steps.submit.outputs.job_id }}
          run-id: ${{ env.SMOKE_RUN_ID }}
          iris-config: ${{ env.IRIS_CONFIG }}
          wandb-entity: ${{ env.WANDB_ENTITY }}
          wandb-project: ${{ env.WANDB_PROJECT }}
          wandb-api-key: ${{ secrets.WANDB_API_KEY }}
          gha-run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Upload Slack message
        if: failure() || cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: slack-message
          path: slack_message.md
          retention-days: 1
          if-no-files-found: ignore

  # Separate job so Slack always fires, even if the main job is force-killed
  # after its grace window. See the datakit-smoke workflow for rationale.
  notify-slack:
    needs: datakit-tier2-ferry
    if: always() && (needs.datakit-tier2-ferry.result == 'failure' || needs.datakit-tier2-ferry.result == 'cancelled') && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Notify Slack
        uses: ./.github/actions/notify-slack
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          fallback-text: ":red_circle: *Datakit Tier 2 Ferry failed*\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
