# GQA (Visual Reasoning) Benchmark
# Dataset: lmms-lab/GQA
# Task Type: Open-ended visual question answering
# Metrics: Accuracy (exact match after normalization)

dataset_path: lmms-lab/GQA
test_split: testdev_balanced
output_type: generate_until

doc_to_image: !function utils.doc_to_image
doc_to_text: !function utils.doc_to_text
doc_to_target: "answer"
process_results: !function utils.process_results

generation_kwargs:
  until:
    - "<|endoftext|>"
    - "<|im_end|>"
    - "\n"
  temperature: 0.0
  do_sample: false
  max_gen_toks: 32

metric_list:
  - metric: acc
    aggregation: mean
    higher_is_better: true

metadata:
  version: 1.0
