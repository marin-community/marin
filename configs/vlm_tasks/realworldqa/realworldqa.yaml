# RealWorldQA Benchmark
# Dataset: xai-org/RealworldQA
# Task Type: Multiple choice (real-world understanding)
# Metrics: Accuracy

dataset_path: xai-org/RealworldQA
test_split: test
output_type: generate_until

doc_to_image: !function utils.doc_to_image
doc_to_text: !function utils.doc_to_text
doc_to_target: "answer"
process_results: !function utils.process_results

generation_kwargs:
  until:
    - "<|endoftext|>"
    - "<|im_end|>"
    - "\n"
  temperature: 0.0
  do_sample: false
  max_gen_toks: 16

metric_list:
  - metric: acc
    aggregation: mean
    higher_is_better: true

metadata:
  version: 1.0
