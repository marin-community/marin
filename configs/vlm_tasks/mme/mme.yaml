# MME (MultiModal Evaluation) Benchmark
# Dataset: lmms-lab/MME
# Task Type: Yes/No question answering
# Metrics: Accuracy, Score (perception + cognition)

dataset_path: lmms-lab/MME
test_split: test
output_type: generate_until

doc_to_image: !function utils.doc_to_image
doc_to_text: !function utils.doc_to_text
doc_to_target: "answer"
process_results: !function utils.process_results

generation_kwargs:
  until:
    - "<|endoftext|>"
    - "<|im_end|>"
    - "\n"
  temperature: 0.0
  do_sample: false
  max_gen_toks: 16

metric_list:
  - metric: acc
    aggregation: mean
    higher_is_better: true
  - metric: !function utils.mme_score
    aggregation: !function utils.aggregate_mme_score
    higher_is_better: true

metadata:
  version: 1.0
