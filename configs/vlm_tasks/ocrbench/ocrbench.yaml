# OCRBench Benchmark
# Dataset: echo840/OCRBench
# Task Type: Text recognition and understanding
# Metrics: Accuracy across 5 categories

dataset_path: echo840/OCRBench
test_split: test
output_type: generate_until

doc_to_image: !function utils.doc_to_image
doc_to_text: !function utils.doc_to_text
doc_to_target: "answer"
process_results: !function utils.process_results

generation_kwargs:
  until:
    - "<|endoftext|>"
    - "<|im_end|>"
  temperature: 0.0
  do_sample: false
  max_gen_toks: 128

metric_list:
  - metric: acc
    aggregation: mean
    higher_is_better: true

metadata:
  version: 1.0
